<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学龄前拼图乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #gameCanvas {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            cursor: pointer;
            max-width: 95vw;
            max-height: 95vh;
        }

</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>

    // ==================== Constants ====================
    const COLORS = {
        primary: '#FFB347',
        secondary: ['#87CEEB', '#98D8AA', '#FFB6C1', '#DDA0DD'],
        background: '#FFF8E7',
        text: '#5D4E37',
        white: '#FFFFFF',
        darkText: '#5D4E37',
        success: '#4CAF50',
        error: '#E57373'
    };

    const SHAPES = ['circle', 'triangle', 'square', 'rectangle', 'heart', 'star'];
    const CANDY_COLORS = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];
    const CUP_COLORS = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];

    // ==================== Audio Manager ====================
    class AudioManager {
        constructor() {
            this.ctx = null;
            this.bgmGain = null;
            this.bgmOsc = null;
            this.bgmPlaying = false;
        }

        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }

        playBGM() {
            if (!this.ctx) this.init();
            if (this.bgmPlaying) return;
            
            this.bgmGain = this.ctx.createGain();
            this.bgmGain.gain.value = 0.15;
            this.bgmGain.connect(this.ctx.destination);

            const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66];
            const duration = 0.5;
            let time = this.ctx.currentTime;

            const playLoop = () => {
                if (!this.bgmPlaying) return;
                for (let i = 0; i < notes.length; i++) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = notes[i];
                    gain.gain.setValueAtTime(0.15, time + i * duration);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + (i + 1) * duration);
                    osc.connect(gain);
                    gain.connect(this.bgmGain);
                    osc.start(time + i * duration);
                    osc.stop(time + (i + 1) * duration);
                }
                time += notes.length * duration;
                this.bgmTimeout = setTimeout(playLoop, notes.length * duration * 1000);
            };

            this.bgmPlaying = true;
            playLoop();
        }

        stopBGM() {
            this.bgmPlaying = false;
            if (this.bgmTimeout) clearTimeout(this.bgmTimeout);
        }

        playSound(type) {
            if (!this.ctx) this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            switch(type) {
                case 'select':
                    osc.frequency.value = 523.25;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.15);
                    break;
                case 'success':
                    osc.frequency.value = 659.25;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                    osc.start();
                    setTimeout(() => {
                        const osc2 = this.ctx.createOscillator();
                        const gain2 = this.ctx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(this.ctx.destination);
                        osc2.frequency.value = 783.99;
                        osc2.type = 'sine';
                        gain2.gain.setValueAtTime(0.3, this.ctx.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                        osc2.start();
                        osc2.stop(this.ctx.currentTime + 0.2);
                    }, 100);
                    osc.stop(this.ctx.currentTime + 0.2);
                    break;
                case 'error':
                    osc.frequency.value = 200;
                    osc.type = 'triangle';
                    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.3);
                    break;
                case 'victory':
                    const victoryNotes = [523.25, 659.25, 783.99, 1046.50];
                    victoryNotes.forEach((freq, i) => {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.connect(g);
                        g.connect(this.ctx.destination);
                        o.frequency.value = freq;
                        o.type = 'sine';
                        g.gain.setValueAtTime(0.25, this.ctx.currentTime + i * 0.15);
                        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.15 + 0.3);
                        o.start(this.ctx.currentTime + i * 0.15);
                        o.stop(this.ctx.currentTime + i * 0.15 + 0.3);
                    });
                    break;
                case 'move':
                    osc.frequency.value = 300;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.08);
                    break;
                case 'bump':
                    osc.frequency.value = 150;
                    osc.type = 'triangle';
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.15);
                    break;
            }
        }
    }

    // ==================== Save Manager ====================
    class SaveManager {
        constructor() {
            this.key = 'preschool_puzzle_progress';
        }

        load() {
            try {
                const data = localStorage.getItem(this.key);
                return data ? JSON.parse(data) : { completed: {} };
            } catch {
                return { completed: {} };
            }
        }

        save(data) {
            try {
                localStorage.setItem(this.key, JSON.stringify(data));
            } catch {}
        }

        markCompleted(gameId) {
            const data = this.load();
            data.completed[gameId] = true;
            this.save(data);
        }

        isCompleted(gameId) {
            return this.load().completed[gameId] || false;
        }
    }

    // ==================== Particle System ====================
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6 - 3;
            this.color = color;
            this.life = 1;
            this.decay = 0.02 + Math.random() * 0.02;
            this.size = 4 + Math.random() * 4;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.15;
            this.life -= this.decay;
        }

        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // ==================== Shape Renderer ====================
    function drawShape(ctx, type, x, y, size, color, stroke = false) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.strokeStyle = stroke ? '#333' : color;
        ctx.lineWidth = stroke ? 3 : 0;

        switch(type) {
            case 'circle':
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.fill();
                if (stroke) ctx.stroke();
                break;
            case 'triangle':
                ctx.beginPath();
                ctx.moveTo(x, y - size / 2);
                ctx.lineTo(x + size / 2, y + size / 2);
                ctx.lineTo(x - size / 2, y + size / 2);
                ctx.closePath();
                ctx.fill();
                if (stroke) ctx.stroke();
                break;
            case 'square':
                const s = size * 0.8;
                ctx.fillRect(x - s / 2, y - s / 2, s, s);
                if (stroke) ctx.strokeRect(x - s / 2, y - s / 2, s, s);
                break;
            case 'rectangle':
                ctx.fillRect(x - size * 0.6, y - size * 0.35, size * 1.2, size * 0.7);
                if (stroke) ctx.strokeRect(x - size * 0.6, y - size * 0.35, size * 1.2, size * 0.7);
                break;
            case 'heart':
                ctx.beginPath();
                const hs = size / 2;
                ctx.moveTo(x, y + hs * 0.3);
                ctx.bezierCurveTo(x - hs, y - hs * 0.5, x - hs, y + hs * 0.3, x, y + hs);
                ctx.bezierCurveTo(x + hs, y + hs * 0.3, x + hs, y - hs * 0.5, x, y + hs * 0.3);
                ctx.fill();
                break;
            case 'star':
                const spikes = 5;
                const outerR = size / 2;
                const innerR = size / 4;
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const angle = (i * Math.PI / spikes) - Math.PI / 2;
                    const px = x + Math.cos(angle) * r;
                    const py = y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                break;
        }
        ctx.restore();
    }

    // ==================== Home Screen ====================
    class HomeScreen {
        constructor(canvas, audio, saveManager, onSelectGame) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.onSelectGame = onSelectGame;
            this.audioInitialized = false;
            this.games = [
                { id: 'shape', name: '形状匹配', icon: 'shape' },
                { id: 'color', name: '颜色分类', icon: 'color' },
                { id: 'maze', name: '简单迷宫', icon: 'maze' }
            ];
            this.buttons = [];
            this.hoveredIndex = -1;
            this.scale = 1;
            this.particles = [];
            this.consecutiveFailures = 0;
            this.init();
        }

        init() {
            this.setupButtons();
            this.canvas.addEventListener('click', (e) => this.handleClick(e));
            this.canvas.addEventListener('mousemove', (e) => this.handleMove(e));
        }

        setupButtons() {
            const startX = 150;
            const gap = 200;
            this.buttons = this.games.map((game, i) => ({
                x: startX + i * gap,
                y: 280,
                width: 150,
                height: 180,
                game: game,
                hovered: false
            }));
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.canvas.width / rect.width;
            const scaleY = this.canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        handleClick(e) {
            const pos = this.getMousePos(e);
            for (let i = 0; i < this.buttons.length; i++) {
                const btn = this.buttons[i];
                if (pos.x >= btn.x - btn.width/2 && pos.x <= btn.x + btn.width/2 &&
                    pos.y >= btn.y - btn.height/2 && pos.y <= btn.y + btn.height/2) {
                    if (!this.audioInitialized) {
                        this.audio.init();
                        this.audio.playBGM();
                        this.audioInitialized = true;
                    }
                    this.audio.playSound('select');
                    this.onSelectGame(this.games[i].id);
                    return;
                }
            }
        }

        handleMove(e) {
            const pos = this.getMousePos(e);
            let found = -1;
            for (let i = 0; i < this.buttons.length; i++) {
                const btn = this.buttons[i];
                btn.hovered = pos.x >= btn.x - btn.width/2 && pos.x <= btn.x + btn.width/2 &&
                              pos.y >= btn.y - btn.height/2 && pos.y <= btn.y + btn.height/2;
                if (btn.hovered) found = i;
            }
            this.hoveredIndex = found;
            this.canvas.style.cursor = found >= 0 ? 'pointer' : 'default';
        }

        drawBackground() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Draw decorative clouds
            ctx.fillStyle = '#E8F4FF';
            this.drawCloud(100, 80, 50);
            this.drawCloud(650, 100, 40);
            this.drawCloud(350, 60, 35);

            // Draw title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('幼儿益智解谜游戏', 400, 120);

            // Draw stars
            ctx.fillStyle = '#FFD700';
            this.drawStar(150, 100, 15);
            this.drawStar(650, 80, 12);
            this.drawStar(380, 90, 10);
        }

        drawCloud(x, y, size) {
            const ctx = this.ctx;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        drawStar(x, y, size) {
            const ctx = this.ctx;
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const r = i % 2 === 0 ? size : size * 0.4;
                const angle = (i * Math.PI / 5) - Math.PI / 2;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
        }

        drawGameIcon(game, x, y, hovered) {
            const ctx = this.ctx;
            const scale = hovered ? 1.08 : 1;
            const s = scale;

            ctx.save();
            ctx.translate(x, y);
            ctx.scale(s, s);

            // Card background
            ctx.fillStyle = hovered ? '#FFF' : '#F5F5F5';
            ctx.strokeStyle = hovered ? COLORS.primary : '#DDD';
            ctx.lineWidth = hovered ? 4 : 2;
            this.roundRect(-60, -70, 120, 140, 16);
            ctx.fill();
            ctx.stroke();

            // Icon
            const iconY = -15;
            switch(game.icon) {
                case 'shape':
                    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
                    SHAPES.forEach((shape, i) => {
                        const col = i % 3;
                        const row = Math.floor(i / 3);
                        drawShape(ctx, shape, -30 + col * 30, iconY - 10 + row * 25, 20, colors[i]);
                    });
                    break;
                case 'color':
                    const colors2 = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];
                    colors2.forEach((c, i) => {
                        const col = i % 2;
                        const row = Math.floor(i / 2);
                        ctx.fillStyle = c;
                        ctx.beginPath();
                        ctx.arc(-20 + col * 40, iconY - 10 + row * 30, 12, 0, Math.PI * 2);
                        ctx.fill();
                        // Shine
                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.beginPath();
                        ctx.arc(-24 + col * 40, iconY - 14 + row * 30, 4, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    break;
                case 'maze':
                    // Simple maze icon
                    ctx.strokeStyle = COLORS.primary;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(-35, -35);
                    ctx.lineTo(-5, -35);
                    ctx.lineTo(-5, -15);
                    ctx.lineTo(15, -15);
                    ctx.lineTo(15, 5);
                    ctx.lineTo(35, 5);
                    ctx.stroke();
                    // Rabbit
                    ctx.fillStyle = '#FFE4E1';
                    ctx.beginPath();
                    ctx.arc(-25, 20, 15, 0, Math.PI * 2);
                    ctx.fill();
                    // Ears
                    ctx.beginPath();
                    ctx.ellipse(-32, 5, 5, 12, -0.2, 0, Math.PI * 2);
                    ctx.ellipse(-18, 5, 5, 12, 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    // Carrot
                    ctx.fillStyle = '#FF6B00';
                    ctx.beginPath();
                    ctx.moveTo(-25, 28);
                    ctx.lineTo(-30, 45);
                    ctx.lineTo(-20, 45);
                    ctx.closePath();
                    ctx.fill();
                    break;
            }

            // Game name
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(game.name, 0, 85);

            // Completed checkmark
            if (this.saveManager.isCompleted(game.id)) {
                ctx.fillStyle = COLORS.success;
                ctx.beginPath();
                ctx.arc(50, -60, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(42, -60);
                ctx.lineTo(48, -54);
                ctx.lineTo(58, -68);
                ctx.stroke();
            }

            ctx.restore();
        }

        roundRect(x, y, w, h, r) {
            const ctx = this.ctx;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        update() {
            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            this.drawBackground();
            this.buttons.forEach((btn, i) => {
                this.drawGameIcon(btn.game, btn.x, btn.y, btn.hovered);
            });
            this.particles.forEach(p => p.draw(this.ctx));
        }
    }

 

    // ==================== Helper ====================
    class Helper {
        constructor() {
            this.messages = [];
            this.currentMessage = null;
            this.currentEmotion = 'happy';
            this.timer = 0;
            this.opacity = 0;
            this.targetOpacity = 0;
            this.x = 70;
            this.y = 480;
            this.baseY = 480;
            this.blinkTimer = 0;
            this.isBlinking = false;
            this.bouncePhase = 0;
            this.speechBubbleScale = 0;
            this.characterType = 0; // 0=fox, 1=rabbit, 2=cat
            this.expressions = ['happy', 'sad', 'thinking', 'excited'];
        }
        show(message, emotion = 'happy', duration = 180) {
            this.messages.push({ message, emotion, duration, timer: duration });
            if (!this.currentMessage) this._nextMessage();
        }
        _nextMessage() {
            if (this.messages.length > 0) {
                const m = this.messages.shift();
                this.currentMessage = m.message;
                this.currentEmotion = m.emotion;
                this.timer = m.timer;
                this.opacity = 0;
                this.targetOpacity = 1;
                this.speechBubbleScale = 0;
            } else {
                this.currentMessage = null;
                this.targetOpacity = 0;
            }
        }
        update(dt) {
            this.bouncePhase += dt * 0.003;
            this.blinkTimer += dt;
            if (this.blinkTimer > 3000 + Math.random() * 2000) {
                this.isBlinking = true;
                this.blinkTimer = 0;
            }
            if (this.isBlinking && this.blinkTimer > 150) {
                this.isBlinking = false;
            }
            if (this.currentMessage) {
                this.timer -= dt;
                this.opacity = Math.min(1, this.opacity + 0.08);
                this.speechBubbleScale = Math.min(1, this.speechBubbleScale + 0.15);
                if (this.timer <= 0) this._nextMessage();
            }
        }
        draw(ctx) {
            const bounceY = Math.sin(this.bouncePhase) * 4;
            const charY = this.y + bounceY;
            ctx.save();
            // Draw character (fox)
            this._drawCharacter(ctx, this.x, charY);
            // Draw speech bubble
            if (this.currentMessage && this.opacity > 0) {
                ctx.globalAlpha = this.opacity;
                this._drawSpeechBubble(ctx, this.x, charY - 80);
            }
            ctx.restore();
        }
        _drawCharacter(ctx, x, y) {
            const t = this.characterType;
            if (t === 0) this._drawFox(ctx, x, y);
            else if (t === 1) this._drawRabbit(ctx, x, y);
            else this._drawCat(ctx, x, y);
        }
        _drawFox(ctx, x, y) {
            // Body
            ctx.fillStyle = '#FF8C42';
            ctx.beginPath();
            ctx.ellipse(x, y + 20, 28, 22, 0, 0, Math.PI * 2);
            ctx.fill();
            // Head
            ctx.beginPath();
            ctx.ellipse(x, y - 15, 32, 30, 0, 0, Math.PI * 2);
            ctx.fill();
            // Ears
            ctx.beginPath();
            ctx.moveTo(x - 25, y - 35);
            ctx.lineTo(x - 15, y - 55);
            ctx.lineTo(x - 5, y - 35);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + 5, y - 35);
            ctx.lineTo(x + 15, y - 55);
            ctx.lineTo(x + 25, y - 35);
            ctx.fill();
            // Inner ears
            ctx.fillStyle = '#FFD4B8';
            ctx.beginPath();
            ctx.moveTo(x - 20, y - 37);
            ctx.lineTo(x - 15, y - 48);
            ctx.lineTo(x - 10, y - 37);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + 10, y - 37);
            ctx.lineTo(x + 15, y - 48);
            ctx.lineTo(x + 20, y - 37);
            ctx.fill();
            // Face
            ctx.fillStyle = '#FFF5EE';
            ctx.beginPath();
            ctx.ellipse(x, y - 5, 18, 16, 0, 0, Math.PI * 2);
            ctx.fill();
            this._drawEyes(ctx, x - 13, y - 18, x + 13, y - 18);
            ctx.fillStyle = '#3D2914';
            ctx.beginPath();
            ctx.ellipse(x, y - 5, 5, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            this._drawMouth(ctx, x, y);
            this._drawBlush(ctx, x - 22, y - 10, x + 22, y - 10);
            const waggle = Math.sin(this.bouncePhase * 2) * 0.2;
            ctx.fillStyle = '#FF8C42';
            ctx.beginPath();
            ctx.ellipse(x + 30, y + 25, 18, 10, 0.3 * Math.PI + waggle, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF5EE';
            ctx.beginPath();
            ctx.ellipse(x + 38, y + 28, 8, 5, 0.3 * Math.PI + waggle, 0, Math.PI * 2);
            ctx.fill();
            const stepOffset = Math.sin(this.bouncePhase * 3) * 2;
            ctx.fillStyle = '#FF8C42';
            ctx.beginPath();
            ctx.ellipse(x - 15, y + 38 + stepOffset, 8, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 15, y + 38 - stepOffset, 8, 5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        _drawRabbit(ctx, x, y) {
            ctx.fillStyle = '#F5F5F5';
            ctx.beginPath();
            ctx.ellipse(x, y + 20, 26, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x, y - 12, 30, 28, 0, 0, Math.PI * 2);
            ctx.fill();
            // Long ears
            ctx.fillStyle = '#F5F5F5';
            ctx.beginPath();
            ctx.ellipse(x - 12, y - 55, 8, 25, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 12, y - 55, 8, 25, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.ellipse(x - 12, y - 55, 4, 18, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 12, y - 55, 4, 18, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF5EE';
            ctx.beginPath();
            ctx.ellipse(x, y - 5, 16, 14, 0, 0, Math.PI * 2);
            ctx.fill();
            this._drawEyes(ctx, x - 10, y - 15, x + 10, y - 15);
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.ellipse(x, y - 3, 4, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            this._drawMouth(ctx, x, y + 2);
            this._drawBlush(ctx, x - 18, y - 8, x + 18, y - 8);
            const hop = Math.abs(Math.sin(this.bouncePhase * 2)) * 5;
            ctx.fillStyle = '#F5F5F5';
            ctx.beginPath();
            ctx.ellipse(x - 12, y + 38 - hop, 7, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 12, y + 38 - hop, 7, 5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        _drawCat(ctx, x, y) {
            ctx.fillStyle = '#808080';
            ctx.beginPath();
            ctx.ellipse(x, y + 20, 26, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x, y - 12, 28, 26, 0, 0, Math.PI * 2);
            ctx.fill();
            // Pointy ears
            ctx.fillStyle = '#808080';
            ctx.beginPath();
            ctx.moveTo(x - 25, y - 25);
            ctx.lineTo(x - 18, y - 50);
            ctx.lineTo(x - 8, y - 28);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + 25, y - 25);
            ctx.lineTo(x + 18, y - 50);
            ctx.lineTo(x + 8, y - 28);
            ctx.fill();
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.moveTo(x - 22, y - 27);
            ctx.lineTo(x - 18, y - 42);
            ctx.lineTo(x - 12, y - 28);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + 22, y - 27);
            ctx.lineTo(x + 18, y - 42);
            ctx.lineTo(x + 12, y - 28);
            ctx.fill();
            ctx.fillStyle = '#FFF5EE';
            ctx.beginPath();
            ctx.ellipse(x, y - 5, 15, 13, 0, 0, Math.PI * 2);
            ctx.fill();
            // Cat eyes (slits)
            ctx.fillStyle = '#3D2914';
            if (this.isBlinking) {
                ctx.strokeStyle = '#3D2914';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x - 15, y - 15);
                ctx.lineTo(x - 5, y - 15);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x + 5, y - 15);
                ctx.lineTo(x + 15, y - 15);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.ellipse(x - 10, y - 15, 3, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x + 10, y - 15, 3, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#90EE90';
                ctx.beginPath();
                ctx.ellipse(x - 10, y - 15, 1.5, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x + 10, y - 15, 1.5, 4, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#3D2914';
            ctx.beginPath();
            ctx.ellipse(x, y - 2, 4, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            this._drawMouth(ctx, x, y + 3);
            this._drawBlush(ctx, x - 20, y - 8, x + 20, y - 8);
            const tailWag = Math.sin(this.bouncePhase * 1.5) * 0.3;
            ctx.strokeStyle = '#808080';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x + 25, y + 15);
            ctx.quadraticCurveTo(x + 45 + Math.sin(this.bouncePhase) * 10, y, x + 40, y - 20);
            ctx.stroke();
            ctx.fillStyle = '#808080';
            ctx.beginPath();
            ctx.ellipse(x - 10, y + 38, 7, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 10, y + 38, 7, 5, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        _drawEyes(ctx, lx, ly, rx, ry) {
            if (this.isBlinking) {
                ctx.strokeStyle = '#3D2914';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(lx - 5, ly);
                ctx.lineTo(lx + 5, ly);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(rx - 5, ry);
                ctx.lineTo(rx + 5, ry);
                ctx.stroke();
            } else {
                ctx.fillStyle = '#3D2914';
                ctx.beginPath();
                ctx.ellipse(lx, ly, 4, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(rx, ry, 4, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(lx - 1, ly - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(rx + 1, ry - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        _drawMouth(ctx, x, y) {
            ctx.strokeStyle = '#3D2914';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (this.currentEmotion === 'happy' || this.currentEmotion === 'excited') {
                ctx.arc(x, y, 8, 0.1 * Math.PI, 0.9 * Math.PI);
            } else if (this.currentEmotion === 'sad') {
                ctx.arc(x, y + 8, 8, 1.1 * Math.PI, 1.9 * Math.PI);
            } else {
                ctx.moveTo(x - 6, y + 2);
                ctx.lineTo(x + 6, y + 2);
            }
            ctx.stroke();
        }
        _drawBlush(ctx, lx, ly, rx, ry) {
            ctx.fillStyle = 'rgba(255, 150, 150, 0.3)';
            ctx.beginPath();
            ctx.ellipse(lx, ly, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(rx, ry, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        _drawSpeechBubble(ctx, x, y) {
            const text = this.currentMessage;
            ctx.font = '13px Arial';
            const tw = Math.min(ctx.measureText(text).width, 260);
            const bw = tw + 30;
            const bh = 36;
            const bx = x - bw / 2;
            const by = y - bh / 2;
            // Bubble
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.strokeStyle = '#FF8C42';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(bx, by, bw, bh, 10);
            ctx.fill();
            ctx.stroke();
            // Tail
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.beginPath();
            ctx.moveTo(x - 6, by + bh);
            ctx.lineTo(x + 6, by + bh);
            ctx.lineTo(x, by + bh + 10);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x - 6, by + bh);
            ctx.lineTo(x + 6, by + bh);
            ctx.lineTo(x, by + bh + 10);
            ctx.stroke();
            // Text
            ctx.fillStyle = '#5D4E37';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, by + bh / 2);
        }
        hide() {
            this.messages = [];
            this.currentMessage = null;
            this.targetOpacity = 0;
        }
    }

   // ==================== Shape Match Game ====================
    class ShapeMatchGame {
        constructor(canvas, audio, saveManager, onBack, onComplete) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.onBack = onBack;
            this.onComplete = onComplete;
            this.particles = [];
            this.selectedShape = null;
            this.matchedShapes = [];
            this.animatingShape = null;
            this.animProgress = 0;
            this.shapes = [];
            this.gridCells = [];
            this.init();
        }

        init() {
            this.shapes = this.shuffle([...SHAPES]);
            this.gridCells = this.shuffle([...Array(6).keys()]);
            this.selectedShape = null;
            this.selectedShapeIndex = null;
            this.matchedShapes = [];
            this.slotContents = [-1, -1, -1, -1, -1, -1]; // Track which source shape is in each slot
            this.particles = [];

            this.canvas.onclick = (e) => this.handleClick(e);
        }

        shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (800 / rect.width),
                y: (e.clientY - rect.top) * (600 / rect.height)
            };
        }

        handleClick(e) {
            const pos = this.getMousePos(e);

            // Check back button
            if (pos.x < 70 && pos.y < 50) {
                this.audio.playSound('select');
                this.onBack();
                return;
            }

            // Check shape clicks
            for (let i = 0; i < 6; i++) {
                const sx = 120 + (i % 3) * 200;
                const sy = 150 + Math.floor(i / 3) * 100;
                const dist = Math.hypot(pos.x - sx, pos.y - sy);
                if (dist < 40 && !this.matchedShapes.includes(i)) {
                    this.audio.playSound('select');
                    this.selectedShape = this.shapes[i]; // Store shape TYPE, not position
                    this.selectedShapeIndex = i; // Also track position for matchedShapes check
                    return;
                }
            }

            // Check target slot clicks
            if (this.selectedShape !== null) {
                for (let i = 0; i < 6; i++) {
                    const tx = 120 + (i % 3) * 200;
                    const ty = 380 + Math.floor(i / 3) * 100;
                    const dist = Math.hypot(pos.x - tx, pos.y - ty);
                    if (dist < 40) {
                        // Match: selected shape type === target slot's expected shape type
                        if (this.selectedShape === SHAPES[this.gridCells[i]]) {
                            this.audio.playSound('success');
                            this.matchedShapes.push(this.selectedShapeIndex);
                            this.slotContents[i] = this.selectedShapeIndex; // Record filled slot
                            this.consecutiveFailures = 0; // Reset on success
                            if (this.helper) this.helper.show('真棒！形状回家啦！', 'happy', 1500);
                            this.animatingShape = { from: this.selectedShapeIndex, to: i };
                            this.animProgress = 0;
                            // Spawn particles
                            for (let j = 0; j < 15; j++) {
                                this.particles.push(new Particle(tx, ty, ['#FFD700', '#FF6B6B', '#4ECDC4'][j % 3]));
                            }
                            this.selectedShape = null;
                            if (this.matchedShapes.length === 6) {
                                setTimeout(() => {
                                    this.audio.playSound('victory');
                                    this.saveManager.markCompleted('shape');
                                    this.onComplete();
                                }, 500);
                            }
                        } else {
                            this.audio.playSound('error');
                            this.consecutiveFailures++;
                            if (this.helper) {
                                if (this.consecutiveFailures >= 3) {
                                    this.helper.show('提示：看看形状，它们的边数一样哦~', 'thinking', 3000);
                                } else {
                                    this.helper.show('差一点哦，再试试看~', 'sad', 1500);
                                }
                            }
                        }
                        return;
                    }
                }
            }
        }

        update() {
            if (this.animatingShape) {
                this.animProgress += 0.05;
                if (this.animProgress >= 1) {
                    this.animatingShape = null;
                }
            }
            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('形状匹配', 400, 60);

            // Back button
            this.drawBackButton();

            // Source shapes (top)
            const shapeColors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
            for (let i = 0; i < 6; i++) {
                const x = 120 + (i % 3) * 200;
                const y = 150 + Math.floor(i / 3) * 100;
                const isMatched = this.matchedShapes.includes(i);
                const isSelected = this.selectedShapeIndex === i;

                ctx.save();
                if (isSelected) {
                    ctx.shadowColor = COLORS.primary;
                    ctx.shadowBlur = 15;
                }
                drawShape(ctx, this.shapes[i], x, y, 60, isMatched ? '#CCC' : shapeColors[i], isSelected);
                ctx.restore();

                // Click hint
                if (isSelected && !isMatched) {
                    ctx.fillStyle = COLORS.text;
                    ctx.font = '14px Arial';
                    ctx.fillText('点击下方匹配位置', x, y + 50);
                }
            }

            // Target slots (bottom)
            for (let i = 0; i < 6; i++) {
                const x = 120 + (i % 3) * 200;
                const y = 380 + Math.floor(i / 3) * 100;
                const hasShape = this.animatingShape && this.animatingShape.to === i;
                const filledShapeIndex = this.slotContents[i];

                if (hasShape) {
                    // Animating shape
                    const progress = this.animProgress;
                    const fromShape = this.shapes[this.animatingShape.from];
                    const color = shapeColors[this.animatingShape.from];
                    drawShape(ctx, fromShape, x, y, 60 * (1 - progress * 0.3), color);
                } else if (filledShapeIndex >= 0) {
                    // Filled slot - show colored shape
                    const shapeType = this.shapes[filledShapeIndex];
                    drawShape(ctx, shapeType, x, y, 50, shapeColors[filledShapeIndex], false);
                } else {
                    // Empty slot - show expected shape outline in gray
                    const expectedShape = SHAPES[this.gridCells[i]];
                    drawShape(ctx, expectedShape, x, y, 50, '#CCC', false);
                }
            }

            // Progress
            ctx.fillStyle = COLORS.text;
            ctx.font = '20px Arial';
            ctx.fillText(`已完成: ${this.matchedShapes.length}/6`, 400, 560);

            this.particles.forEach(p => p.draw(ctx));
        }

        drawBackButton() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.arc(40, 40, 25, 0, Math.PI * 2);
            ctx.fill();
            // House icon
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(28, 45);
            ctx.lineTo(40, 28);
            ctx.lineTo(52, 45);
            ctx.lineTo(52, 52);
            ctx.lineTo(28, 52);
            ctx.closePath();
            ctx.fill();
        }
    }

    // ==================== Color Sort Game ====================
    class ColorSortGame {
        constructor(canvas, audio, saveManager, onBack, onComplete) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.onBack = onBack;
            this.onComplete = onComplete;
            this.particles = [];
            this.selectedCandy = null;
            this.candies = [];
            this.cupCandies = [0, 0, 0, 0];
            this.animatingCandyIndex = null;
            this.animatingTargetCup = null;
            this.fallingProgress = 0;
            this.init();
        }

        init() {
            // Generate 12 candies with random colors
            this.candies = [];
            for (let i = 0; i < 12; i++) {
                this.candies.push({
                    colorIndex: i % 4,
                    x: 100 + (i % 4) * 200,
                    y: 80,
                    matched: false,
                    floatOffset: Math.random() * Math.PI * 2
                });
            }
            this.selectedCandy = null;
            this.cupCandies = [0, 0, 0, 0];
            this.particles = [];
            this.canvas.onclick = (e) => this.handleClick(e);
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (800 / rect.width),
                y: (e.clientY - rect.top) * (600 / rect.height)
            };
        }

        handleClick(e) {
            const pos = this.getMousePos(e);

            // Back button
            if (pos.x < 70 && pos.y < 50) {
                this.audio.playSound('select');
                this.onBack();
                return;
            }

            // Check candy clicks
            for (let i = 0; i < this.candies.length; i++) {
                const candy = this.candies[i];
                if (candy.matched || this.animatingCandyIndex !== null) continue;
                const dist = Math.hypot(pos.x - candy.x, pos.y - candy.y);
                if (dist < 30) {
                    this.audio.playSound('select');
                    this.selectedCandy = this.selectedCandy === i ? null : i;
                    return;
                }
            }

            // Check cup clicks
            if (this.selectedCandy !== null) {
                for (let i = 0; i < 4; i++) {
                    const cupX = 100 + i * 200;
                    const cupY = 450;
                    const dist = Math.hypot(pos.x - cupX, pos.y - cupY);
                    if (dist < 50) {
                        const candy = this.candies[this.selectedCandy];
                        if (candy.colorIndex === i) {
                            this.audio.playSound('success');
                            this.animatingCandyIndex = this.selectedCandy;
                            this.animatingTargetCup = i;
                            this.fallingProgress = 0;
                            this.selectedCandy = null;
                        } else {
                            this.audio.playSound('error');
                        }
                        return;
                    }
                }
            }
        }

        update() {
            if (this.animatingCandyIndex !== null) {
                this.fallingProgress += 0.03;
                if (this.fallingProgress >= 1) {
                    const candyIndex = this.animatingCandyIndex;
                    const targetCup = this.animatingTargetCup;
                    this.cupCandies[targetCup]++;
                    this.candies[candyIndex].matched = true;
                    // Particles
                    for (let j = 0; j < 10; j++) {
                        this.particles.push(new Particle(
                            this.candies[candyIndex].x,
                            450 - this.cupCandies[targetCup] * 10,
                            CUP_COLORS[targetCup]
                        ));
                    }
                    this.animatingCandyIndex = null;
                    this.animatingTargetCup = null;

                    // Check win
                    if (this.candies.every(c => c.matched)) {
                        setTimeout(() => {
                            this.audio.playSound('victory');
                            this.saveManager.markCompleted('color');
                            this.onComplete();
                        }, 300);
                    }
                }
            }
            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('颜色分类', 400, 60);

            // Back button
            this.drawBackButton();

            // Draw candies
            const time = Date.now() / 1000;
            this.candies.forEach((candy, i) => {
                if (candy.matched) return;
                const isSelected = this.selectedCandy === i;
                const floatY = Math.sin(time * 2 + candy.floatOffset) * 5;
                const y = candy.y + floatY;

                ctx.save();
                if (isSelected) {
                    ctx.shadowColor = '#333';
                    ctx.shadowBlur = 10;
                }

                // Candy body
                ctx.fillStyle = CANDY_COLORS[candy.colorIndex];
                ctx.beginPath();
                ctx.arc(candy.x, y, 25, 0, Math.PI * 2);
                ctx.fill();

                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(candy.x - 8, y - 8, 8, 0, Math.PI * 2);
                ctx.fill();

                // Wrapper ends
                ctx.fillStyle = CANDY_COLORS[candy.colorIndex];
                ctx.beginPath();
                ctx.moveTo(candy.x - 25, y);
                ctx.lineTo(candy.x - 40, y - 8);
                ctx.lineTo(candy.x - 40, y + 8);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(candy.x + 25, y);
                ctx.lineTo(candy.x + 40, y - 8);
                ctx.lineTo(candy.x + 40, y + 8);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            });

            // Falling candy animation
            if (this.animatingCandyIndex !== null) {
                const p = this.fallingProgress;
                const candy = this.candies[this.animatingCandyIndex];
                const startY = 80;
                const endY = 450 - this.cupCandies[this.animatingTargetCup] * 10;
                const y = startY + (endY - startY) * this.easeInBounce(p);
                const x = candy.x;

                ctx.fillStyle = CANDY_COLORS[candy.colorIndex];
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw cups
            for (let i = 0; i < 4; i++) {
                const x = 100 + i * 200;
                const y = 450;
                const color = CUP_COLORS[i];

                // Cup body (trapezoid)
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(x - 45, y - 60);
                ctx.lineTo(x + 45, y - 60);
                ctx.lineTo(x + 55, y + 30);
                ctx.lineTo(x - 55, y + 30);
                ctx.closePath();
                ctx.fill();

                // Cup rim
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(x, y - 60, 50, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                // Inner shadow
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath();
                ctx.ellipse(x, y - 55, 40, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Candies in cup
                for (let j = 0; j < this.cupCandies[i]; j++) {
                    const cy = y - 5 - j * 12;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, cy, 10, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Label
                ctx.fillStyle = COLORS.text;
                ctx.font = '18px Arial';
                ctx.fillText(['红', '黄', '绿', '蓝'][i], x, y + 55);
            }

            // Instructions
            if (this.selectedCandy !== null) {
                ctx.fillStyle = COLORS.text;
                ctx.font = '20px Arial';
                ctx.fillText('点击对应颜色的杯子', 400, 560);
            }

            this.particles.forEach(p => p.draw(ctx));
        }

        easeInBounce(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        drawBackButton() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.arc(40, 40, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(28, 45);
            ctx.lineTo(40, 28);
            ctx.lineTo(52, 45);
            ctx.lineTo(52, 52);
            ctx.lineTo(28, 52);
            ctx.closePath();
            ctx.fill();
        }
    }

    // ==================== Maze Game ====================
    class MazeGame {
        constructor(canvas, audio, saveManager, onBack, onComplete) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.onBack = onBack;
            this.onComplete = onComplete;
            this.particles = [];
            this.cellSize = 50;
            this.maze = [];
            this.player = { x: 1, y: 1 };
            this.exit = { x: 7, y: 7 };
            this.playerVisual = { x: 1, y: 1 };
            this.moving = false;
            this.moveProgress = 0;
            this.direction = null;
            this.bumpTime = 0;
            this.victory = false;
            this.controlButtons = [
                { dir: 'up', x: 700, y: 200 },
                { dir: 'down', x: 700, y: 320 },
                { dir: 'left', x: 640, y: 260 },
                { dir: 'right', x: 760, y: 260 }
            ];
            this.init();
        }

        init() {
            this.generateMaze();
            this.player = { x: 1, y: 1 };
            this.playerVisual = { x: 1, y: 1 };
            this.moving = false;
            this.bumpTime = 0;
            this.victory = false;
            this.canvas.onclick = (e) => this.handleClick(e);
            this.canvas.onkeydown = (e) => this.handleKey(e);
        }

        generateMaze() {
            const size = 9;
            this.maze = Array(size).fill().map(() => Array(size).fill(1));

            const stack = [];
            const start = { x: 1, y: 1 };
            this.maze[start.y][start.x] = 0;
            stack.push(start);

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];

                for (const [dx, dy] of [[0,-2], [0,2], [-2,0], [2,0]]) {
                    const nx = current.x + dx;
                    const ny = current.y + dy;
                    if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && this.maze[ny][nx] === 1) {
                        neighbors.push({ x: nx, y: ny, mx: current.x + dx/2, my: current.y + dy/2 });
                    }
                }

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    this.maze[next.my][next.mx] = 0;
                    this.maze[next.y][next.x] = 0;
                    stack.push({ x: next.x, y: next.y });
                } else {
                    stack.pop();
                }
            }

            // Ensure exit is accessible
            this.maze[7][7] = 0;
            this.maze[7][6] = 0;
            this.maze[6][7] = 0;
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (800 / rect.width),
                y: (e.clientY - rect.top) * (600 / rect.height)
            };
        }

        handleClick(e) {
            if (this.victory) return;

            const pos = this.getMousePos(e);

            // Back button
            if (pos.x < 70 && pos.y < 50) {
                this.audio.playSound('select');
                this.onBack();
                return;
            }

            // Control buttons
            for (const btn of this.controlButtons) {
                const dist = Math.hypot(pos.x - btn.x, pos.y - btn.y);
                if (dist < 30) {
                    this.tryMove(btn.dir);
                    return;
                }
            }
        }

        handleKey(e) {
            if (this.victory) return;
            const keyMap = {
                'ArrowUp': 'up', 'w': 'up', 'W': 'up',
                'ArrowDown': 'down', 's': 'down', 'S': 'down',
                'ArrowLeft': 'left', 'a': 'left', 'A': 'left',
                'ArrowRight': 'right', 'd': 'right', 'D': 'right'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                this.tryMove(keyMap[e.key]);
            }
        }

        tryMove(dir) {
            if (this.moving) return;

            let nx = this.player.x;
            let ny = this.player.y;

            switch(dir) {
                case 'up': ny--; break;
                case 'down': ny++; break;
                case 'left': nx--; break;
                case 'right': nx++; break;
            }

            if (this.maze[ny] && this.maze[ny][nx] === 0) {
                this.audio.playSound('move');
                this.direction = dir;
                this.moving = true;
                this.moveProgress = 0;
                this.player = { x: nx, y: ny };

                // Check victory
                if (nx === this.exit.x && ny === this.exit.y) {
                    setTimeout(() => {
                        this.victory = true;
                        this.audio.playSound('victory');
                        this.saveManager.markCompleted('maze');
                        for (let i = 0; i < 30; i++) {
                            this.particles.push(new Particle(
                                200 + nx * this.cellSize,
                                100 + ny * this.cellSize,
                                ['#FFD700', '#FF6B6B', '#4ECDC4', '#DDA0DD'][i % 4]
                            ));
                        }
                        setTimeout(this.onComplete, 1500);
                    }, 200);
                }
            } else {
                this.audio.playSound('bump');
                this.bumpTime = 10;
            }
        }

        update() {
            if (this.moving) {
                this.moveProgress += 0.12;
                if (this.moveProgress >= 1) {
                    this.moving = false;
                    this.moveProgress = 0;
                    this.playerVisual = { ...this.player };
                } else {
                    const progress = this.moveProgress;
                    const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                    switch(this.direction) {
                        case 'up':
                            this.playerVisual.y = this.playerVisual.y - (1 - ease);
                            break;
                        case 'down':
                            this.playerVisual.y = this.playerVisual.y + (1 - ease);
                            break;
                        case 'left':
                            this.playerVisual.x = this.playerVisual.x - (1 - ease);
                            break;
                        case 'right':
                            this.playerVisual.x = this.playerVisual.x + (1 - ease);
                            break;
                    }
                }
            }

            if (this.bumpTime > 0) this.bumpTime--;

            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('简单迷宫', 400, 60);

            // Back button
            this.drawBackButton();

            // Draw maze
            const offsetX = 50;
            const offsetY = 100;
            const size = this.cellSize;

            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) {
                    const px = offsetX + x * size;
                    const py = offsetY + y * size;

                    if (this.maze[y][x] === 1) {
                        ctx.fillStyle = COLORS.primary;
                        ctx.fillRect(px, py, size - 2, size - 2);
                    } else {
                        ctx.fillStyle = '#F5F5DC';
                        ctx.fillRect(px, py, size - 2, size - 2);
                    }
                }
            }

            // Exit marker
            ctx.fillStyle = COLORS.success;
            ctx.beginPath();
            ctx.arc(offsetX + this.exit.x * size + size/2, offsetY + this.exit.y * size + size/2, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('★', offsetX + this.exit.x * size + size/2, offsetY + this.exit.y * size + size/2 + 6);

            // Player (rabbit)
            const playerX = offsetX + this.playerVisual.x * size + size/2 + (this.bumpTime > 0 ? Math.sin(this.bumpTime) * 3 : 0);
            const playerY = offsetY + this.playerVisual.y * size + size/2;

            // Rabbit body
            ctx.fillStyle = '#FFE4E1';
            ctx.beginPath();
            ctx.arc(playerX, playerY, 18, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.beginPath();
            ctx.ellipse(playerX - 10, playerY - 22, 6, 14, -0.2, 0, Math.PI * 2);
            ctx.ellipse(playerX + 10, playerY - 22, 6, 14, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.ellipse(playerX - 10, playerY - 20, 3, 8, -0.2, 0, Math.PI * 2);
            ctx.ellipse(playerX + 10, playerY - 20, 3, 8, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(playerX - 6, playerY - 3, 3, 0, Math.PI * 2);
            ctx.arc(playerX + 6, playerY - 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // Nose
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.arc(playerX, playerY + 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // Direction controls
            ctx.textAlign = 'center';
            for (const btn of this.controlButtons) {
                const isPressed = this.direction === btn.dir && this.moving;
                ctx.fillStyle = isPressed ? '#E68A00' : COLORS.primary;
                ctx.beginPath();
                ctx.arc(btn.x, btn.y, 30, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 24px Arial';
                const arrows = { up: '↑', down: '↓', left: '←', right: '→' };
                ctx.fillText(arrows[btn.dir], btn.x, btn.y + 8);
            }

            // Instructions
            ctx.fillStyle = COLORS.text;
            ctx.font = '18px Arial';
            ctx.fillText('用方向按钮控制小兔子到达星星', 400, 560);

            this.particles.forEach(p => p.draw(ctx));
        }

        drawBackButton() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.arc(40, 40, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(28, 45);
            ctx.lineTo(40, 28);
            ctx.lineTo(52, 45);
            ctx.lineTo(52, 52);
            ctx.lineTo(28, 52);
            ctx.closePath();
            ctx.fill();
        }

        enableKeyControls() {
            this.canvas.tabIndex = 1;
            this.canvas.focus();
            this.canvas.addEventListener('keydown', (e) => this.handleKey(e));
        }
    }

    // ==================== Victory Modal ====================
    class VictoryModal {
        constructor(ctx, onReplay, onHome) {
            this.ctx = ctx;
            this.onReplay = onReplay;
            this.onHome = onHome;
            this.alpha = 0;
            this.scale = 0.5;
            this.stars = [];
            for (let i = 0; i < 5; i++) {
                this.stars.push({
                    x: 300 + i * 50,
                    y: 200,
                    delay: i * 0.15,
                    rotation: 0
                });
            }
        }

        update() {
            this.alpha = Math.min(1, this.alpha + 0.05);
            this.scale = Math.min(1, this.scale + 0.08);
        }

        draw() {
            const ctx = this.ctx;

            // Overlay
            ctx.save();
            ctx.globalAlpha = this.alpha * 0.7;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 600);
            ctx.restore();

            // Card
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.translate(400, 300);
            ctx.scale(this.scale, this.scale);

            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.roundRect(-180, -150, 360, 300, 20);
            ctx.fill();
            ctx.strokeStyle = COLORS.primary;
            ctx.lineWidth = 4;
            ctx.stroke();

            // Stars
            const time = Date.now() / 1000;
            this.stars.forEach((star, i) => {
                const t = Math.max(0, time - star.delay);
                const y = 200 - Math.min(50, t * 100);
                const rot = Math.sin(time * 2 + i) * 0.1;
                ctx.save();
                ctx.translate(star.x - 400, y - 300);
                ctx.rotate(rot);
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                for (let j = 0; j < 10; j++) {
                    const r = j % 2 === 0 ? 20 : 8;
                    const angle = (j * Math.PI / 5) - Math.PI / 2;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (j === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });

            // Text
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('恭喜过关!', 0, -60);

            ctx.font = '24px Arial';
            ctx.fillText('太棒了!', 0, -20);

            // Buttons
            // Replay button
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.roundRect(-130, 30, 110, 50, 12);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('再玩一次', -75, 60);

            // Home button
            ctx.fillStyle = COLORS.secondary[0];
            ctx.beginPath();
            ctx.roundRect(20, 30, 110, 50, 12);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.fillText('返回首页', 75, 60);

            ctx.restore();
        }

        handleClick(x, y) {
            if (this.alpha < 0.9) return false;
            // Replay button area
            if (x >= 270 && x <= 380 && y >= 330 && y <= 380) {
                return 'replay';
            }
            // Home button area
            if (x >= 420 && x <= 530 && y >= 330 && y <= 380) {
                return 'home';
            }
            return null;
        }
    }

    // ==================== Main Game ====================
    class Game {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.audio = new AudioManager();
            this.saveManager = new SaveManager();
            this.helper = new Helper();
            this.currentScreen = 'home';
            this.currentGame = null;
            this.victoryModal = null;
            this.homeScreen = null;

            this.init();
        }

        init() {
            this.showHome();
            this.canvas.addEventListener('click', (e) => this.handleClick(e));
            document.addEventListener('keydown', (e) => {
                if (this.currentGame && this.currentGame.handleKey) {
                    this.currentGame.handleKey(e);
                }
            });
            requestAnimationFrame(() => this.gameLoop());
        }

        showHome() {
            this.currentScreen = 'home';
            this.currentGame = null;
            this.victoryModal = null;
            this.homeScreen = new HomeScreen(
                this.canvas,
                this.audio,
                this.saveManager,
                (gameId) => this.startGame(gameId)
            );
        }

        startGame(gameId) {
            this.currentScreen = 'game';
            this.currentGame = null;

            switch(gameId) {
                case 'shape':
                    this.currentGame = new ShapeMatchGame(
                        this.canvas,
                        this.audio,
                        this.saveManager,
                        () => this.showHome(),
                        () => this.showVictory()
                    );
                    break;
                case 'color':
                    this.currentGame = new ColorSortGame(
                        this.canvas,
                        this.audio,
                        this.saveManager,
                        () => this.showHome(),
                        () => this.showVictory(),
                        this.helper
                    );
                    break;
                case 'maze':
                    this.currentGame = new MazeGame(
                        this.canvas,
                        this.audio,
                        this.saveManager,
                        () => this.showHome(),
                        () => this.showVictory(),
                        this.helper
                    );
                    this.currentGame.enableKeyControls();
                    break;
            }
        }

        showVictory() {
            this.victoryModal = new VictoryModal(
                this.ctx,
                () => this.replayGame(),
                () => this.showHome()
            );
        }

        replayGame() {
            if (this.currentGame && this.currentGame.init) {
                this.currentGame.init();
            }
            this.victoryModal = null;
        }

        handleClick(e) {
            const rect = this.canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (800 / rect.width);
            const y = (e.clientY - rect.top) * (600 / rect.height);

            if (this.victoryModal) {
                const action = this.victoryModal.handleClick(x, y);
                if (action === 'replay') {
                    this.audio.playSound('select');
                    this.replayGame();
                } else if (action === 'home') {
                    this.audio.playSound('select');
                    this.showHome();
                }
            }
        }

        gameLoop() {
            // Update
            if (this.homeScreen) {
                this.homeScreen.update();
            }
            if (this.currentGame) {
                this.currentGame.update();
            }
            if (this.victoryModal) {
                this.victoryModal.update();
            }
            if (this.helper) {
                this.helper.update(16);
            }

            // Draw
            this.ctx.clearRect(0, 0, 800, 600);

            if (this.homeScreen) {
                this.homeScreen.draw();
            }
            if (this.currentGame) {
                this.currentGame.draw();
            }
            if (this.victoryModal) {
                this.victoryModal.draw();
            }
            if (this.helper) {
                this.helper.draw(this.ctx);
            }

            requestAnimationFrame(() => this.gameLoop());
        }
    }

    // Start game
    const game = new Game();
    
    </script>
