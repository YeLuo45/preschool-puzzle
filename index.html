<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>

    // ==================== Constants ====================
    const COLORS = {
        primary: '#FFB347',
        secondary: ['#87CEEB', '#98D8AA', '#FFB6C1', '#DDA0DD'],
        background: '#FFF8E7',
        text: '#5D4E37',
        white: '#FFFFFF',
        darkText: '#5D4E37',
        success: '#4CAF50',
        error: '#E57373'
    };

    const SHAPES = ['circle', 'triangle', 'square', 'rectangle', 'heart', 'star'];
    const CANDY_COLORS = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];
    const CUP_COLORS = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];

    // ==================== Audio Manager ====================
    class AudioManager {
        constructor() {
            this.ctx = null;
            this.bgmGain = null;
            this.bgmOsc = null;
            this.bgmPlaying = false;
        }

        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }

        playBGM() {
            if (!this.ctx) this.init();
            if (this.bgmPlaying) return;
            
            this.bgmGain = this.ctx.createGain();
            this.bgmGain.gain.value = 0.15;
            this.bgmGain.connect(this.ctx.destination);

            const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66];
            const duration = 0.5;
            let time = this.ctx.currentTime;

            const playLoop = () => {
                if (!this.bgmPlaying) return;
                for (let i = 0; i < notes.length; i++) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = notes[i];
                    gain.gain.setValueAtTime(0.15, time + i * duration);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + (i + 1) * duration);
                    osc.connect(gain);
                    gain.connect(this.bgmGain);
                    osc.start(time + i * duration);
                    osc.stop(time + (i + 1) * duration);
                }
                time += notes.length * duration;
                this.bgmTimeout = setTimeout(playLoop, notes.length * duration * 1000);
            };

            this.bgmPlaying = true;
            playLoop();
        }

        stopBGM() {
            this.bgmPlaying = false;
            if (this.bgmTimeout) clearTimeout(this.bgmTimeout);
        }

        playSound(type) {
            if (!this.ctx) this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            switch(type) {
                case 'select':
                    osc.frequency.value = 523.25;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.15);
                    break;
                case 'success':
                    osc.frequency.value = 659.25;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                    osc.start();
                    setTimeout(() => {
                        const osc2 = this.ctx.createOscillator();
                        const gain2 = this.ctx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(this.ctx.destination);
                        osc2.frequency.value = 783.99;
                        osc2.type = 'sine';
                        gain2.gain.setValueAtTime(0.3, this.ctx.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                        osc2.start();
                        osc2.stop(this.ctx.currentTime + 0.2);
                    }, 100);
                    osc.stop(this.ctx.currentTime + 0.2);
                    break;
                case 'error':
                    osc.frequency.value = 200;
                    osc.type = 'triangle';
                    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.3);
                    break;
                case 'victory':
                    const victoryNotes = [523.25, 659.25, 783.99, 1046.50];
                    victoryNotes.forEach((freq, i) => {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.connect(g);
                        g.connect(this.ctx.destination);
                        o.frequency.value = freq;
                        o.type = 'sine';
                        g.gain.setValueAtTime(0.25, this.ctx.currentTime + i * 0.15);
                        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.15 + 0.3);
                        o.start(this.ctx.currentTime + i * 0.15);
                        o.stop(this.ctx.currentTime + i * 0.15 + 0.3);
                    });
                    break;
                case 'move':
                    osc.frequency.value = 300;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.08);
                    break;
                case 'bump':
                    osc.frequency.value = 150;
                    osc.type = 'triangle';
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.15);
                    break;
            }
        }
    }

    // ==================== Save Manager ====================
    class SaveManager {
        constructor() {
            this.key = 'preschool_puzzle_progress';
        }

        load() {
            try {
                const data = localStorage.getItem(this.key);
                return data ? JSON.parse(data) : { completed: {} };
            } catch {
                return { completed: {} };
            }
        }

        save(data) {
            try {
                localStorage.setItem(this.key, JSON.stringify(data));
            } catch {}
        }

        markCompleted(gameId) {
            const data = this.load();
            data.completed[gameId] = true;
            this.save(data);
        }

        isCompleted(gameId) {
            return this.load().completed[gameId] || false;
        }
    }

    // ==================== Particle System ====================
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6 - 3;
            this.color = color;
            this.life = 1;
            this.decay = 0.02 + Math.random() * 0.02;
            this.size = 4 + Math.random() * 4;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.15;
            this.life -= this.decay;
        }

        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // ==================== Shape Renderer ====================
    function drawShape(ctx, type, x, y, size, color, stroke = false) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.strokeStyle = stroke ? '#333' : color;
        ctx.lineWidth = stroke ? 3 : 0;

        switch(type) {
            case 'circle':
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.fill();
                if (stroke) ctx.stroke();
                break;
            case 'triangle':
                ctx.beginPath();
                ctx.moveTo(x, y - size / 2);
                ctx.lineTo(x + size / 2, y + size / 2);
                ctx.lineTo(x - size / 2, y + size / 2);
                ctx.closePath();
                ctx.fill();
                if (stroke) ctx.stroke();
                break;
            case 'square':
                const s = size * 0.8;
                ctx.fillRect(x - s / 2, y - s / 2, s, s);
                if (stroke) ctx.strokeRect(x - s / 2, y - s / 2, s, s);
                break;
            case 'rectangle':
                ctx.fillRect(x - size * 0.6, y - size * 0.35, size * 1.2, size * 0.7);
                if (stroke) ctx.strokeRect(x - size * 0.6, y - size * 0.35, size * 1.2, size * 0.7);
                break;
            case 'heart':
                ctx.beginPath();
                const hs = size / 2;
                ctx.moveTo(x, y + hs * 0.3);
                ctx.bezierCurveTo(x - hs, y - hs * 0.5, x - hs, y + hs * 0.3, x, y + hs);
                ctx.bezierCurveTo(x + hs, y + hs * 0.3, x + hs, y - hs * 0.5, x, y + hs * 0.3);
                ctx.fill();
                break;
            case 'star':
                const spikes = 5;
                const outerR = size / 2;
                const innerR = size / 4;
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const angle = (i * Math.PI / spikes) - Math.PI / 2;
                    const px = x + Math.cos(angle) * r;
                    const py = y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                break;
        }
        ctx.restore();
    }

    // ==================== Home Screen ====================
    class HomeScreen {
        constructor(canvas, audio, saveManager, onSelectGame) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.onSelectGame = onSelectGame;
            this.audioInitialized = false;
            this.games = [
                { id: 'shape', name: '形状匹配', icon: 'shape' },
                { id: 'color', name: '颜色分类', icon: 'color' },
                { id: 'maze', name: '简单迷宫', icon: 'maze' }
            ];
            this.buttons = [];
            this.hoveredIndex = -1;
            this.scale = 1;
            this.particles = [];
            this.consecutiveFailures = 0;
            this.init();
        }

        init() {
            this.setupButtons();
            this.canvas.addEventListener('click', (e) => this.handleClick(e));
            this.canvas.addEventListener('mousemove', (e) => this.handleMove(e));
        }

        setupButtons() {
            const startX = 150;
            const gap = 200;
            this.buttons = this.games.map((game, i) => ({
                x: startX + i * gap,
                y: 280,
                width: 150,
                height: 180,
                game: game,
                hovered: false
            }));
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.canvas.width / rect.width;
            const scaleY = this.canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        handleClick(e) {
            const pos = this.getMousePos(e);
            for (let i = 0; i < this.buttons.length; i++) {
                const btn = this.buttons[i];
                if (pos.x >= btn.x - btn.width/2 && pos.x <= btn.x + btn.width/2 &&
                    pos.y >= btn.y - btn.height/2 && pos.y <= btn.y + btn.height/2) {
                    if (!this.audioInitialized) {
                        this.audio.init();
                        this.audio.playBGM();
                        this.audioInitialized = true;
                    }
                    this.audio.playSound('select');
                    this.onSelectGame(this.games[i].id);
                    return;
                }
            }
        }

        handleMove(e) {
            const pos = this.getMousePos(e);
            let found = -1;
            for (let i = 0; i < this.buttons.length; i++) {
                const btn = this.buttons[i];
                btn.hovered = pos.x >= btn.x - btn.width/2 && pos.x <= btn.x + btn.width/2 &&
                              pos.y >= btn.y - btn.height/2 && pos.y <= btn.y + btn.height/2;
                if (btn.hovered) found = i;
            }
            this.hoveredIndex = found;
            this.canvas.style.cursor = found >= 0 ? 'pointer' : 'default';
        }

        drawBackground() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Draw decorative clouds
            ctx.fillStyle = '#E8F4FF';
            this.drawCloud(100, 80, 50);
            this.drawCloud(650, 100, 40);
            this.drawCloud(350, 60, 35);

            // Draw title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('幼儿益智解谜游戏', 400, 120);

            // Draw stars
            ctx.fillStyle = '#FFD700';
            this.drawStar(150, 100, 15);
            this.drawStar(650, 80, 12);
            this.drawStar(380, 90, 10);
        }

        drawCloud(x, y, size) {
            const ctx = this.ctx;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        drawStar(x, y, size) {
            const ctx = this.ctx;
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const r = i % 2 === 0 ? size : size * 0.4;
                const angle = (i * Math.PI / 5) - Math.PI / 2;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
        }

        drawGameIcon(game, x, y, hovered) {
            const ctx = this.ctx;
            const scale = hovered ? 1.08 : 1;
            const s = scale;

            ctx.save();
            ctx.translate(x, y);
            ctx.scale(s, s);

            // Card background
            ctx.fillStyle = hovered ? '#FFF' : '#F5F5F5';
            ctx.strokeStyle = hovered ? COLORS.primary : '#DDD';
            ctx.lineWidth = hovered ? 4 : 2;
            this.roundRect(-60, -70, 120, 140, 16);
            ctx.fill();
            ctx.stroke();

            // Icon
            const iconY = -15;
            switch(game.icon) {
                case 'shape':
                    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
                    SHAPES.forEach((shape, i) => {
                        const col = i % 3;
                        const row = Math.floor(i / 3);
                        drawShape(ctx, shape, -30 + col * 30, iconY - 10 + row * 25, 20, colors[i]);
                    });
                    break;
                case 'color':
                    const colors2 = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];
                    colors2.forEach((c, i) => {
                        const col = i % 2;
                        const row = Math.floor(i / 2);
                        ctx.fillStyle = c;
                        ctx.beginPath();
                        ctx.arc(-20 + col * 40, iconY - 10 + row * 30, 12, 0, Math.PI * 2);
                        ctx.fill();
                        // Shine
                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.beginPath();
                        ctx.arc(-24 + col * 40, iconY - 14 + row * 30, 4, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    break;
                case 'maze':
                    // Simple maze icon
                    ctx.strokeStyle = COLORS.primary;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(-35, -35);
                    ctx.lineTo(-5, -35);
                    ctx.lineTo(-5, -15);
                    ctx.lineTo(15, -15);
                    ctx.lineTo(15, 5);
                    ctx.lineTo(35, 5);
                    ctx.stroke();
                    // Rabbit
                    ctx.fillStyle = '#FFE4E1';
                    ctx.beginPath();
                    ctx.arc(-25, 20, 15, 0, Math.PI * 2);
                    ctx.fill();
                    // Ears
                    ctx.beginPath();
                    ctx.ellipse(-32, 5, 5, 12, -0.2, 0, Math.PI * 2);
                    ctx.ellipse(-18, 5, 5, 12, 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    // Carrot
                    ctx.fillStyle = '#FF6B00';
                    ctx.beginPath();
                    ctx.moveTo(-25, 28);
                    ctx.lineTo(-30, 45);
                    ctx.lineTo(-20, 45);
                    ctx.closePath();
                    ctx.fill();
                    break;
            }

            // Game name
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(game.name, 0, 85);

            // Completed checkmark
            if (this.saveManager.isCompleted(game.id)) {
                ctx.fillStyle = COLORS.success;
                ctx.beginPath();
                ctx.arc(50, -60, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(42, -60);
                ctx.lineTo(48, -54);
                ctx.lineTo(58, -68);
                ctx.stroke();
            }

            ctx.restore();
        }

        roundRect(x, y, w, h, r) {
            const ctx = this.ctx;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        update() {
            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            this.drawBackground();
            this.buttons.forEach((btn, i) => {
                this.drawGameIcon(btn.game, btn.x, btn.y, btn.hovered);
            });
            this.particles.forEach(p => p.draw(this.ctx));
        }
    }

 

    // ==================== Helper ====================
    class Helper {
        constructor() {
            this.messages = [];
            this.currentMessage = null;
            this.currentEmotion = 'happy';
            this.timer = 0;
            this.opacity = 0;
            this.targetOpacity = 0;
            this.x = 70;
            this.y = 480;
            this.baseY = 480;
            this.blinkTimer = 0;
            this.isBlinking = false;
            this.bouncePhase = 0;
            this.speechBubbleScale = 0;
            this.characterType = 0;
            this.showLevelUI = true;
            this.uiExpanded = false;
            this.achievements = this._getDefaultAchievements();
            this.newAchievement = null;
            this.newAchievementTimer = 0; // 0=fox, 1=rabbit, 2=cat
            this.expressions = ['happy', 'sad', 'thinking', 'excited'];
            this.switchTimer = 0;
            this.switchScale = 1;
            this.particles = [];
            this.clickReaction = 0;
            this.hoverTimer = 0;
            this.isHovered = false;
            this.typingText = '';
            this.typingIndex = 0;
            this.typingSpeed = 30; // ms per character
            this.sparkles = [];
            this.idleTimer = 0;
            this.lastEmotion = 'happy';
            // Initialize sparkles
            for (let i = 0; i < 5; i++) {
                this.sparkles.push({
                    x: Math.random() * 60 - 30,
                    y: Math.random() * -60 - 20,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    angle: Math.random() * Math.PI * 2,
                    life: Math.random() * 2000
                });
            }
            this.breathPhase = 0;
            this.shadowOffset = 5;
            this.audioContext = null;
            this.lastSoundTime = 0;
            this.unlockedCharacters = [0]; // Fox is always unlocked
            this.currentCharacterIndex = 0;
            this.totalGamesPlayed = 0;
            this.totalSuccesses = 0;
            this.level = 1;
            this.xp = 0;
            this.xpToNextLevel = 50;
            // Character unlock requirements
            // Load saved progress
            this._loadProgress();
            this.characterDefs = [
                { id: 0, name: '小狐狸', unlockXP: 0, color: '#FF8C42' },
                { id: 1, name: '小兔子', unlockXP: 100, color: '#F5F5F5' },
                { id: 2, name: '小猫咪', unlockXP: 250, color: '#808080' },
                { id: 3, name: '小熊猫', unlockXP: 500, color: '#2D2D2D' },
                { id: 4, name: '小熊', unlockXP: 800, color: '#8B4513' },
                { id: 5, name: '小老虎', unlockXP: 1200, color: '#FF6600' },
                { id: 6, name: '小狮子', unlockXP: 1800, color: '#DAA520' },
                { id: 7, name: '小青龙', unlockXP: 2500, color: '#228B22' }
            ];
        }
        _getDefaultAchievements() {
            return [
                { id: 'first_win', name: '初次胜利', desc: '完成第一个游戏', icon: '⭐', unlocked: false },
                { id: 'win_10', name: '小试牛刀', desc: '累计胜利10次', icon: '🌟', unlocked: false, progress: 0, target: 10 },
                { id: 'win_50', name: '游戏达人', desc: '累计胜利50次', icon: '🌟🌟', unlocked: false, progress: 0, target: 50 },
                { id: 'all_chars', name: '角色收藏家', desc: '解锁所有角色', icon: '🎭', unlocked: false },
                { id: 'level_5', name: '五级选手', desc: '达到5级', icon: '🏆', unlocked: false },
                { id: 'level_10', name: '十级大师', desc: '达到10级', icon: '🏆🏆', unlocked: false },
                { id: 'combo_3', name: '三连成功', desc: '连续成功3次', icon: '🔥', unlocked: false },
                { id: 'play_20', name: '勤奋玩家', desc: '累计游玩20次', icon: '🎮', unlocked: false, progress: 0, target: 20 }
            ];
        }
        _checkAchievements() {
            for (const ach of this.achievements) {
                if (ach.unlocked) continue;
                let shouldUnlock = false;
                if (ach.id === 'first_win' && this.totalSuccesses >= 1) shouldUnlock = true;
                if (ach.id === 'win_10') { ach.progress = this.totalSuccesses; if (ach.progress >= ach.target) shouldUnlock = true; }
                if (ach.id === 'win_50') { ach.progress = this.totalSuccesses; if (ach.progress >= ach.target) shouldUnlock = true; }
                if (ach.id === 'all_chars') { if (this.unlockedCharacters.length >= this.characterDefs.length) shouldUnlock = true; }
                if (ach.id === 'level_5') { if (this.level >= 5) shouldUnlock = true; }
                if (ach.id === 'level_10') { if (this.level >= 10) shouldUnlock = true; }
                if (ach.id === 'play_20') { ach.progress = this.totalGamesPlayed; if (ach.progress >= ach.target) shouldUnlock = true; }
                if (shouldUnlock) {
                    ach.unlocked = true;
                    this.newAchievement = ach;
                    this.newAchievementTimer = 3000;
                    this._saveProgress();
                    break;
                }
            }
        }
        _loadProgress() {
            try {
                const saved = localStorage.getItem('preschool-helper-progress');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.xp = data.xp || 0;
                    this.level = data.level || 1;
                    this.unlockedCharacters = data.unlockedCharacters || [0];
                    this.totalGamesPlayed = data.totalGamesPlayed || 0;
                    this.totalSuccesses = data.totalSuccesses || 0;
                    this.xpToNextLevel = data.xpToNextLevel || 50;
                    this.characterType = data.characterType || 0;
                }
            } catch (e) {}
        }
        _saveProgress() {
            try {
                localStorage.setItem('preschool-helper-progress', JSON.stringify({
                    xp: this.xp,
                    level: this.level,
                    unlockedCharacters: this.unlockedCharacters,
                    totalGamesPlayed: this.totalGamesPlayed,
                    totalSuccesses: this.totalSuccesses,
                    xpToNextLevel: this.xpToNextLevel,
                    characterType: this.characterType
                }));
            } catch (e) {}
        }
        show(message, emotion = 'happy', duration = 180) {
            this.messages.push({ message, emotion, duration, timer: duration });
            if (!this.currentMessage) this._nextMessage();
            this._playEmotionSound(emotion);
        }
        onGameComplete(success) {
            this.totalGamesPlayed++;
            if (success) {
                this.totalSuccesses++;
                this.addXP(10 + this.level * 2);
            } else {
                this.addXP(2);
            }
            this._checkUnlocks();
            this._checkAchievements();
        }
        addXP(amount) {
            this.xp += amount;
            this._saveProgress();
            while (this.xp >= this.xpToNextLevel) {
                this.xp -= this.xpToNextLevel;
                this.level++;
                this.xpToNextLevel = Math.floor(this.xpToNextLevel * 1.3);
                this.show(`升级啦！现在是 Lv.${this.level}！`, 'excited', 200);
            }
        }
        _checkUnlocks() {
            for (const char of this.characterDefs) {
                if (!this.unlockedCharacters.includes(char.id) && this.xp >= char.unlockXP) {
                    this.unlockedCharacters.push(char.id);
                    this._saveProgress();
                    this.show(`解锁新角色：${char.name}！`, 'excited', 250);
                    break;
                }
            }
        }
        cycleCharacter() {
            this._saveProgress();
            // Only cycle to unlocked characters
            const unlocked = this.characterDefs.filter(c => this.unlockedCharacters.includes(c.id));
            const currentIdx = unlocked.findIndex(c => c.id === this.characterDefs[this.characterType].id);
            const nextIdx = (currentIdx + 1) % unlocked.length;
            this.characterType = unlocked[nextIdx].id;
            this.nextCharacter();
        }
        _playEmotionSound(emotion) {
            try {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const ctx = this.audioContext;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                const now = ctx.currentTime;
                // Different tones for different emotions
                if (emotion === 'happy' || emotion === 'excited') {
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, now + 0.3);
                } else if (emotion === 'sad') {
                    osc.frequency.setValueAtTime(392, now); // G4
                    osc.frequency.setValueAtTime(329.63, now + 0.15); // E4
                    gain.gain.setValueAtTime(0.08, now);
                } else if (emotion === 'thinking') {
                    osc.frequency.setValueAtTime(440, now); // A4
                    osc.frequency.setValueAtTime(493.88, now + 0.1); // B4
                    gain.gain.setValueAtTime(0.06, now);
                } else {
                    osc.frequency.setValueAtTime(500, now);
                    gain.gain.setValueAtTime(0.05, now);
                }
                gain.gain.setValueAtTime(gain.gain.value || 0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } catch (e) {
                // Audio not available, continue silently
            }
        }
        _nextMessage() {
            if (this.messages.length > 0) {
                const m = this.messages.shift();
                this.currentMessage = m.message;
                this.currentEmotion = m.emotion;
                this.timer = m.timer;
                this.opacity = 0;
                this.targetOpacity = 1;
                this.speechBubbleScale = 0;
                this.typingText = '';
                this.typingIndex = 0;
            } else {
                this.currentMessage = null;
                this.typingText = '';
                this.targetOpacity = 0;
            }
        }
        update(dt) {
            this.bouncePhase += dt * 0.003;
            this.blinkTimer += dt;
            if (this.blinkTimer > 3000 + Math.random() * 2000) {
                this.isBlinking = true;
                this.blinkTimer = 0;
            }
            if (this.isBlinking && this.blinkTimer > 150) {
                this.isBlinking = false;
            }
            // Character switch animation
            if (this.switchTimer > 0) {
                this.switchTimer -= dt;
                this.switchScale = Math.abs(Math.sin(this.switchTimer * 0.02)) * 0.3 + 0.7;
            } else {
                this.switchScale = 1;
            }
            if (this.currentMessage) {
                // Typing effect
                if (this.typingIndex < this.currentMessage.length) {
                    this.typingIndex += dt / this.typingSpeed;
                    this.typingText = this.currentMessage.substring(0, Math.floor(this.typingIndex));
                }
                this.timer -= dt;
                this.opacity = Math.min(1, this.opacity + 0.08);
                this.speechBubbleScale = Math.min(1, this.speechBubbleScale + 0.15);
                if (this.timer <= 0) this._nextMessage();
            }
            // Update particles
            this.particles = this.particles.filter(p => {
                p.life -= dt;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05;
                return p.life > 0;
            });
            // Decay click reaction
            if (this.clickReaction > 0) this.clickReaction -= dt * 0.005;
            if (this.hoverTimer > 0) this.hoverTimer -= dt;
            // Update sparkles
            for (const s of this.sparkles) {
                s.life -= dt;
                s.angle += s.speed * 0.02;
                s.y += Math.sin(s.angle) * 0.3;
                s.x += Math.cos(s.angle) * 0.2;
                if (s.life <= 0) {
                    s.x = Math.random() * 60 - 30;
                    s.y = Math.random() * -60 - 20;
                    s.life = Math.random() * 2000 + 1000;
                }
            }
            // Track emotion changes for special effects
            if (this.currentEmotion !== this.lastEmotion) {
                if (this.currentEmotion === 'excited') this.spawnPraiseParticles();
                this.lastEmotion = this.currentEmotion;
            }
        }
        onClick() {
            this.clickReaction = 1;
            // Toggle level UI
            this.uiExpanded = !this.uiExpanded;
            // Spawn celebration particles
            for (let i = 0; i < 8; i++) {
                this.particles.push({
                    x: this.x,
                    y: this.y - 20,
                    vx: (Math.random() - 0.5) * 3,
                    vy: -Math.random() * 2 - 1,
                    color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#FF8C42'][Math.floor(Math.random() * 4)],
                    life: 500,
                    size: Math.random() * 4 + 2
                });
            }
        }
        spawnPraiseParticles() {
            for (let i = 0; i < 12; i++) {
                this.particles.push({
                    x: this.x + (Math.random() - 0.5) * 60,
                    y: this.y - 30,
                    vx: (Math.random() - 0.5) * 2,
                    vy: -Math.random() * 1.5 - 0.5,
                    color: ['#FFD700', '#FF69B4', '#87CEEB'][Math.floor(Math.random() * 3)],
                    life: 800,
                    size: Math.random() * 3 + 2
                });
            }
        }
        nextCharacter() {
            this.characterType = (this.characterType + 1) % 3;
            this.switchTimer = 500;
            this.switchScale = 1;
        }
        draw(ctx) {
            this.breathPhase += 0.02;
            const bounceY = Math.sin(this.bouncePhase) * 4;
            const breathScale = 1 + Math.sin(this.breathPhase) * 0.02;
            const charY = this.y + bounceY;
            ctx.save();
            // Draw level UI at top
            this._drawLevelUI(ctx);
            // Draw achievement popup
            if (this.newAchievement && this.newAchievementTimer > 0) {
                this._drawAchievementPopup(ctx);
            }
            // Apply click reaction (jump)
            const jumpOffset = this.clickReaction * 10 * Math.sin(this.bouncePhase * 5);
            ctx.translate(this.x, charY - jumpOffset);
            ctx.scale(this.switchScale * breathScale, this.switchScale * breathScale);
            ctx.translate(-this.x, -(charY - jumpOffset));
            // Draw shadow
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y + 50, 30 * (1 + jumpOffset * 0.02), 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            // Draw character
            this._drawCharacter(ctx, this.x, charY - jumpOffset);
            ctx.restore();
            // Draw particles
            ctx.save();
            for (const p of this.particles) {
                ctx.globalAlpha = p.life / 800;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            // Draw sparkles around character
            ctx.save();
            for (const s of this.sparkles) {
                const sx = this.x + s.x;
                const sy = charY + s.y;
                ctx.globalAlpha = Math.min(1, s.life / 500) * 0.6;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                // Draw 4-point star
                const spikes = 4;
                const outerRadius = s.size;
                const innerRadius = s.size * 0.4;
                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const px = sx + Math.cos(angle) * radius;
                    const py = sy + Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
            // Draw speech bubble
            if (this.currentMessage && this.opacity > 0) {

                this._drawSpeechBubble(ctx, this.x, charY - 80);
                ctx.restore();
            }
        }
        _drawCharacter(ctx, x, y) {
            const t = this.characterType;
            if (t === 0) this._drawFox(ctx, x, y);
            else if (t === 1) this._drawRabbit(ctx, x, y);
            else if (t === 2) this._drawCat(ctx, x, y);

            else if (t === 5) this._drawTiger(ctx, x, y);

            else if (t === 7) this._drawDragon(ctx, x, y);
        }
        _drawPanda(ctx, x, y) {

        _drawAchievementPopup(ctx) {

            const popupY = 150 + (1 - scale) * 50;

        _drawLevelUI(ctx) {
            if (!this.showLevelUI) return;

            const uiH = this.uiExpanded ? 120 : 50;

            ctx.roundRect(uiX, uiY, uiW, uiH, 10);

            gradient.addColorStop(1, '#FFA500');

            ctx.beginPath();
            ctx.roundRect(barX, barY, barW * xpProgress, barH, 6);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = '10px Arial';

            // Character icons row (when expanded)

                    const char = chars[i];

            }
            ctx.textAlign = 'left';

        _drawDragon(ctx, x, y) {
            // Dragon body with scales effect
            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.ellipse(x, y + 20, 28, 22, 0, 0, Math.PI * 2);

            ctx.moveTo(x - 20, y - 35);
            ctx.lineTo(x - 15, y - 55);
            ctx.lineTo(x - 8, y - 38);

            ctx.moveTo(x + 20, y - 35);
