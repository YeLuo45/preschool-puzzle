            this.timeSlow = false;
            this.timeSlowTimer = 0;
            this.doublePoints = false;
            this.shieldActive = false;
            this.revealActive = false;
            this.revealTimer = 0;
            this.itemButtons = [];
            this.controlButtons = [
                { dir: 'up', x: 700, y: 200 },
                { dir: 'down', x: 700, y: 320 },
                { dir: 'left', x: 640, y: 260 },
                { dir: 'right', x: 760, y: 260 }
            ];
            this.init();
        }

        init() {
            this.generateMaze();
            this.player = { x: 1, y: 1 };
            this.playerVisual = { x: 1, y: 1 };
            this.moving = false;
            this.bumpTime = 0;
            this.victory = false;
            this.pathHighlight = [];
            this.canPhase = false;
            this.timeSlow = false;
            this.timeSlowTimer = 0;
            this.doublePoints = false;
            this.shieldActive = false;
            this.revealActive = false;
            this.revealTimer = 0;
            this.setupItemButtons();
            this.canvas.onclick = (e) => this.handleClick(e);
            this.canvas.onkeydown = (e) => this.handleKey(e);
        }

        setupItemButtons() {
            this.itemButtons = [];
            const items = [
                { id: 'map_fragment', label: '🗺️', x: 720, y: 30 },
                { id: 'wall_soften', label: '👻', x: 770, y: 30 },
                { id: 'time_slow', label: '⏳', x: 720, y: 70 },
                { id: 'double_points', label: '✖2', x: 770, y: 70 },
                { id: 'shield', label: '🛡', x: 720, y: 110 },
                { id: 'reveal_answer', label: '📖', x: 770, y: 110 }
            ];
            items.forEach(item => {
                const count = this.starManager.getItemCount(item.id);
                if (count > 0) {
                    this.itemButtons.push({ ...item, count });
                }
            });
        }

        useItem(itemId) {
            if (!this.starManager.hasItem(itemId)) return false;
            this.starManager.useItem(itemId);
            if (itemId === 'map_fragment') {
                // Show path from current position to exit (up to 3 steps)
                const path = this.findPath(this.player.x, this.player.y, this.exit.x, this.exit.y);
                this.pathHighlight = path.slice(0, 3);
                this.audio.playSound('select');
            } else if (itemId === 'wall_soften') {
                this.canPhase = true;
                this.audio.playSound('select');
            } else if (itemId === 'time_slow') {
                this.timeSlow = true;
                this.timeSlowTimer = 600;
                this.audio.playSound('select');
            } else if (itemId === 'double_points') {
                this.doublePoints = true;
                this.setupItemButtons();
                return true;
            } else if (itemId === 'shield') {
                this.shieldActive = true;
                this.audio.playSound('select');
            } else if (itemId === 'reveal_answer') {
                this.revealActive = true;
                this.revealTimer = 300;
                this.audio.playSound('select');
            }
            this.setupItemButtons();
            return true;
        }

        findPath(sx, sy, ex, ey) {
            const queue = [{ x: sx, y: sy, path: [] }];
            const visited = new Set();
            visited.add(`${sx},${sy}`);
            while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.x === ex && curr.y === ey) return curr.path;
                for (const [dx, dy] of [[0,-1], [0,1], [-1,0], [1,0]]) {
                    const nx = curr.x + dx;
                    const ny = curr.y + dy;
                    const key = `${nx},${ny}`;
                    if (!visited.has(key) && this.maze[ny] && this.maze[ny][nx] === 0) {
                        visited.add(key);
                        queue.push({ x: nx, y: ny, path: [...curr.path, { x: nx, y: ny }] });
                    }
                }
            }
            return [];
        }

        generateMaze() {
            const size = 9;
            this.maze = Array(size).fill().map(() => Array(size).fill(1));

            const stack = [];
            const start = { x: 1, y: 1 };
            this.maze[start.y][start.x] = 0;
            stack.push(start);

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];

                for (const [dx, dy] of [[0,-2], [0,2], [-2,0], [2,0]]) {
                    const nx = current.x + dx;
                    const ny = current.y + dy;
                    if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && this.maze[ny][nx] === 1) {
                        neighbors.push({ x: nx, y: ny, mx: current.x + dx/2, my: current.y + dy/2 });
                    }
                }

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    this.maze[next.my][next.mx] = 0;
                    this.maze[next.y][next.x] = 0;
                    stack.push({ x: next.x, y: next.y });
                } else {
                    stack.pop();
                }
            }

            // Ensure exit is accessible
            this.maze[7][7] = 0;
            this.maze[7][6] = 0;
            this.maze[6][7] = 0;
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (800 / rect.width),
                y: (e.clientY - rect.top) * (600 / rect.height)
            };
        }

        handleClick(e) {
            if (this.victory) return;

            const pos = this.getMousePos(e);

            // Item buttons
            for (const btn of this.itemButtons) {
                const dx = pos.x - btn.x;
                const dy = pos.y - btn.y;
                if (Math.abs(dx) < 25 && Math.abs(dy) < 20) {
                    this.useItem(btn.id);
                    return;
                }
            }

            // Back button
            if (pos.x < 70 && pos.y < 50) {
                this.audio.playSound('select');
                this.onBack();
                return;
            }

            // Control buttons
            for (const btn of this.controlButtons) {
                const dist = Math.hypot(pos.x - btn.x, pos.y - btn.y);
                if (dist < 30) {
                    this.tryMove(btn.dir);
                    return;
                }
            }
        }

        handleKey(e) {
            if (this.victory) return;
            const keyMap = {
                'ArrowUp': 'up', 'w': 'up', 'W': 'up',
                'ArrowDown': 'down', 's': 'down', 'S': 'down',
                'ArrowLeft': 'left', 'a': 'left', 'A': 'left',
                'ArrowRight': 'right', 'd': 'right', 'D': 'right'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                this.tryMove(keyMap[e.key]);
            }
        }

        tryMove(dir) {
            if (this.moving) return;

            let nx = this.player.x;
            let ny = this.player.y;

            switch(dir) {
                case 'up': ny--; break;
                case 'down': ny++; break;
                case 'left': nx--; break;
                case 'right': nx++; break;
            }

            if (this.maze[ny] && this.maze[ny][nx] === 0) {
                this.audio.playSound('move');
                this.direction = dir;
                this.moving = true;
                this.moveProgress = 0;
                this.player = { x: nx, y: ny };

                // Check victory
                if (nx === this.exit.x && ny === this.exit.y) {
                    setTimeout(() => {
                        this.victory = true;
                        this.audio.playSound('victory');
                        this.saveManager.markCompleted('maze');
                        for (let i = 0; i < 30; i++) {
                            this.particles.push(new Particle(
                                200 + nx * this.cellSize,
                                100 + ny * this.cellSize,
                                ['#FFD700', '#FF6B6B', '#4ECDC4', '#DDA0DD'][i % 4]
                            ));
                        }
                        setTimeout(this.onComplete, 1500);
                    }, 200);
                }
            } else {
                this.audio.playSound('bump');
                this.bumpTime = 10;
            }
        }

        update() {
            if (this.moving) {
                this.moveProgress += 0.12;
                if (this.moveProgress >= 1) {
                    this.moving = false;
                    this.moveProgress = 0;
                    this.playerVisual = { ...this.player };
                } else {
                    const progress = this.moveProgress;
                    const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                    switch(this.direction) {
                        case 'up':
                            this.playerVisual.y = this.playerVisual.y - (1 - ease);
                            break;
                        case 'down':
                            this.playerVisual.y = this.playerVisual.y + (1 - ease);
                            break;
                        case 'left':
                            this.playerVisual.x = this.playerVisual.x - (1 - ease);
                            break;
                        case 'right':
                            this.playerVisual.x = this.playerVisual.x + (1 - ease);
                            break;
                    }
                }
            }

            if (this.bumpTime > 0) this.bumpTime--;

            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Item buttons (top right)
            this.itemButtons.forEach(btn => {
                ctx.fillStyle = COLORS.primary;
                ctx.beginPath();
                ctx.roundRect(btn.x - 25, btn.y - 20, 50, 40, 8);
                ctx.fill();
                ctx.fillStyle = '#FFF';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(btn.label, btn.x, btn.y + 6);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(`×${btn.count}`, btn.x + 15, btn.y - 8);
            });

            // Title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('简单迷宫', 400, 60);

            // Back button
            this.drawBackButton();

            // Draw maze
            const offsetX = 50;
            const offsetY = 100;
            const size = this.cellSize;

            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) {
                    const px = offsetX + x * size;
                    const py = offsetY + y * size;

                    if (this.maze[y][x] === 1) {
                        ctx.fillStyle = COLORS.primary;
                        ctx.fillRect(px, py, size - 2, size - 2);
                    } else {
                        ctx.fillStyle = '#F5F5DC';
                        ctx.fillRect(px, py, size - 2, size - 2);
                    }
                }
            }

            // Path highlight for map_fragment
            if (this.pathHighlight.length > 0) {
                this.pathHighlight.forEach((cell, i) => {
                    const alpha = 1 - i * 0.2;
                    ctx.fillStyle = `rgba(0, 255, 0, ${alpha * 0.4})`;
                    ctx.fillRect(offsetX + cell.x * size + 2, offsetY + cell.y * size + 2, size - 6, size - 6);
                });
            }

            // Exit marker
            ctx.fillStyle = COLORS.success;
            ctx.beginPath();
            ctx.arc(offsetX + this.exit.x * size + size/2, offsetY + this.exit.y * size + size/2, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('★', offsetX + this.exit.x * size + size/2, offsetY + this.exit.y * size + size/2 + 6);

            // Player (rabbit)
            const playerX = offsetX + this.playerVisual.x * size + size/2 + (this.bumpTime > 0 ? Math.sin(this.bumpTime) * 3 : 0);
            const playerY = offsetY + this.playerVisual.y * size + size/2;

            // Rabbit body
            ctx.fillStyle = '#FFE4E1';
            ctx.beginPath();
            ctx.arc(playerX, playerY, 18, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.beginPath();
            ctx.ellipse(playerX - 10, playerY - 22, 6, 14, -0.2, 0, Math.PI * 2);
            ctx.ellipse(playerX + 10, playerY - 22, 6, 14, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.ellipse(playerX - 10, playerY - 20, 3, 8, -0.2, 0, Math.PI * 2);
            ctx.ellipse(playerX + 10, playerY - 20, 3, 8, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(playerX - 6, playerY - 3, 3, 0, Math.PI * 2);
            ctx.arc(playerX + 6, playerY - 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // Nose
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.arc(playerX, playerY + 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // Direction controls
            ctx.textAlign = 'center';
            for (const btn of this.controlButtons) {
                const isPressed = this.direction === btn.dir && this.moving;
                ctx.fillStyle = isPressed ? '#E68A00' : COLORS.primary;
                ctx.beginPath();
                ctx.arc(btn.x, btn.y, 30, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 24px Arial';
                const arrows = { up: '↑', down: '↓', left: '←', right: '→' };
                ctx.fillText(arrows[btn.dir], btn.x, btn.y + 8);
            }

            // Instructions
            ctx.fillStyle = COLORS.text;
            ctx.font = '18px Arial';
            ctx.fillText('用方向按钮控制小兔子到达星星', 400, 560);

            this.particles.forEach(p => p.draw(ctx));
        }

        drawBackButton() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.arc(40, 40, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(28, 45);
            ctx.lineTo(40, 28);
            ctx.lineTo(52, 45);
            ctx.lineTo(52, 52);
            ctx.lineTo(28, 52);
            ctx.closePath();
            ctx.fill();
        }

        enableKeyControls() {
            this.canvas.tabIndex = 1;
            this.canvas.focus();
            this.canvas.addEventListener('keydown', (e) => this.handleKey(e));
        }
    }

    // ==================== Victory Modal ====================
    class VictoryModal {
        constructor(ctx, onReplay, onHome) {
            this.ctx = ctx;
            this.onReplay = onReplay;
            this.onHome = onHome;
            this.alpha = 0;
            this.scale = 0.5;
            this.stars = [];
            for (let i = 0; i < 5; i++) {
                this.stars.push({
                    x: 300 + i * 50,
                    y: 200,
                    delay: i * 0.15,
                    rotation: 0
                });
            }
        }

        update() {
            this.alpha = Math.min(1, this.alpha + 0.05);
            this.scale = Math.min(1, this.scale + 0.08);
        }

        draw() {
            const ctx = this.ctx;

            // Overlay
            ctx.save();
            ctx.globalAlpha = this.alpha * 0.7;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 600);
            ctx.restore();

            // Card
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.translate(400, 300);
            ctx.scale(this.scale, this.scale);

            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.roundRect(-180, -150, 360, 300, 20);
            ctx.fill();
            ctx.strokeStyle = COLORS.primary;
            ctx.lineWidth = 4;
            ctx.stroke();

            // Stars
            const time = Date.now() / 1000;
            this.stars.forEach((star, i) => {
                const t = Math.max(0, time - star.delay);
                const y = 200 - Math.min(50, t * 100);
                const rot = Math.sin(time * 2 + i) * 0.1;
                ctx.save();
                ctx.translate(star.x - 400, y - 300);
                ctx.rotate(rot);
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                for (let j = 0; j < 10; j++) {
                    const r = j % 2 === 0 ? 20 : 8;
                    const angle = (j * Math.PI / 5) - Math.PI / 2;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (j === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });

            // Text
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('恭喜过关!', 0, -60);

            ctx.font = '24px Arial';
            ctx.fillText('太棒了!', 0, -20);

            // Buttons
            // Replay button
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.roundRect(-130, 30, 110, 50, 12);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('再玩一次', -75, 60);

            // Home button
            ctx.fillStyle = COLORS.secondary[0];
            ctx.beginPath();
            ctx.roundRect(20, 30, 110, 50, 12);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.fillText('返回首页', 75, 60);

            ctx.restore();
        }

        handleClick(x, y) {
            if (this.alpha < 0.9) return false;
            // Replay button area
            if (x >= 270 && x <= 380 && y >= 330 && y <= 380) {
                return 'replay';
            }
            // Home button area
            if (x >= 420 && x <= 530 && y >= 330 && y <= 380) {
                return 'home';
            }
            return null;
        }
    }

    // ==================== Main Game ====================
    class Game {
        constructor() {
            this.canvas = document.getElementById('gameCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.audio = new AudioManager();
            this.saveManager = new SaveManager();
            this.starManager = new StarManager();
            this.achievementManager = new AchievementManager(this.starManager);
            this.currentScreen = 'home';
            this.currentGame = null;
            this.victoryModal = null;
            this.homeScreen = null;
            this.itemShop = null;

            this.init();
        }

        init() {
            this.showHome();
            this.canvas.addEventListener('click', (e) => this.handleClick(e));
            document.addEventListener('keydown', (e) => {
                if (this.currentGame && this.currentGame.handleKey) {
                    this.currentGame.handleKey(e);
                }
            });
            requestAnimationFrame(() => this.gameLoop());
        }

        showHome() {
            this.currentScreen = 'home';
            this.currentGame = null;
            this.victoryModal = null;
            this.itemShop = null;
            this.achievementPanel = null;
            this.homeScreen = new HomeScreen(
                this.canvas,
                this.audio,
                this.saveManager,
                this.starManager,
                (gameId) => this.startGame(gameId),
                () => this.openShop(),
                this.achievementManager,
                () => this.showAchievements()
            );
        }

        showAchievements() {
            this.currentScreen = 'achievements';
            this.homeScreen = null;
            this.itemShop = null;
            this.achievementPanel = new AchievementPanel(this.ctx, this.achievementManager, () => this.showHome());
        }

        openShop() {
            this.currentScreen = 'shop';
            this.homeScreen = null;
            this.achievementPanel = null;
            this.itemShop = new ItemShop(this.canvas, this.ctx, this.audio, this.starManager, this.achievementManager, () => this.showHome());
        }

        startGame(gameId) {
            this.currentScreen = 'game';
            this.currentGame = null;
            this.itemShop = null;

            switch(gameId) {
                case 'shape':
                    this.currentGame = new ShapeMatchGame(
                        this.canvas,
                        this.audio,
                        this.saveManager,
                        this.starManager,
                        () => this.showHome(),
                        () => this.showVictory()
                    );
                    break;
                case 'color':
                    this.currentGame = new ColorSortGame(
                        this.canvas,
                        this.audio,
                        this.saveManager,
                        this.starManager,
                        () => this.showHome(),
                        () => this.showVictory()
                    );
                    break;
                case 'maze':
                    this.currentGame = new MazeGame(
                        this.canvas,
                        this.audio,
                        this.saveManager,
                        this.starManager,
                        () => this.showHome(),
                        () => this.showVictory()
                    );
                    this.currentGame.enableKeyControls();
                    break;
            }
        }

showVictory() {
            // Award star on first completion, track for achievements
            const gameId = this.currentGame && this.currentGame.constructor.name === 'ShapeMatchGame' ? 'shape' :
                           this.currentGame && this.currentGame.constructor.name === 'ColorSortGame' ? 'color' : 'maze';
            const isFirst = !this.saveManager.isCompleted(gameId);
            const doubleMult = (this.currentGame && this.currentGame.doublePoints) ? 2 : 1;
            if (isFirst) {
                this.starManager.addStars(1 * doubleMult);
                this.starManager.addTotalStarsEarned(1 * doubleMult);
            }
            this.starManager.incrementGameComplete(gameId);
            this.achievementManager.checkAndAward();
            this.victoryModal = new VictoryModal(
                this.ctx,
                () => this.replayGame(),
                () => this.showHome()
            );
        }

        replayGame() {
            if (this.currentGame && this.currentGame.init) {
                this.currentGame.init();
            }
            this.victoryModal = null;
        }

        handleClick(e) {
            const rect = this.canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (800 / rect.width);
            const y = (e.clientY - rect.top) * (600 / rect.height);

            if (this.itemShop) {
                return;
            }

            if (this.victoryModal) {
                const action = this.victoryModal.handleClick(x, y);
                if (action === 'replay') {
                    this.audio.playSound('select');
                    this.replayGame();
                } else if (action === 'home') {
                    this.audio.playSound('select');
                    this.showHome();
                }
                return;
            }

            if (this.achievementPanel) {
                this.achievementPanel.handleClick(x, y);
                return;
            }
        }

        gameLoop() {
            // Update
            if (this.homeScreen) {
                this.homeScreen.update();
            }
            if (this.currentGame) {
                this.currentGame.update();
            }
            if (this.victoryModal) {
                this.victoryModal.update();
            }
            if (this.itemShop) {
                this.itemShop.update();
            }
            if (this.achievementPanel) {
                // no update needed
            }

            // Draw
            this.ctx.clearRect(0, 0, 800, 600);

            if (this.homeScreen) {
                this.homeScreen.draw();
            }
            if (this.currentGame) {
                this.currentGame.draw();
            }
            if (this.victoryModal) {
                this.victoryModal.draw();
            }
            if (this.itemShop) {
                this.itemShop.draw();
            }
            if (this.achievementPanel) {
                this.achievementPanel.draw();
            }

            requestAnimationFrame(() => this.gameLoop());
        }
    }

    // Start game
    const game = new Game();
    </script>
