<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼儿益智解谜游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, "PingFang SC", sans-serif;
            background: #FFF8E7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
        }
        #gameCanvas {
            display: block;
            background: #FFF8E7;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        @media (max-width: 820px) or (max-height: 620px) {
            #gameContainer {
                transform: scale(min(calc(100vw / 800), calc(100vh / 600)));
                transform-origin: center center;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
    // ==================== Constants ====================
    const COLORS = {
        primary: '#FFB347',
        secondary: ['#87CEEB', '#98D8AA', '#FFB6C1', '#DDA0DD'],
        background: '#FFF8E7',
        text: '#5D4E37',
        white: '#FFFFFF',
        darkText: '#5D4E37',
        success: '#4CAF50',
        error: '#E57373'
    };

    const SHAPES = ['circle', 'triangle', 'square', 'rectangle', 'heart', 'star'];
    const CANDY_COLORS = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];
    const CUP_COLORS = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];

    // ==================== Audio Manager ====================
    class AudioManager {
        constructor() {
            this.ctx = null;
            this.bgmGain = null;
            this.bgmOsc = null;
            this.bgmPlaying = false;
        }

        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }

        playBGM() {
            if (!this.ctx) this.init();
            if (this.bgmPlaying) return;
            
            this.bgmGain = this.ctx.createGain();
            this.bgmGain.gain.value = 0.15;
            this.bgmGain.connect(this.ctx.destination);

            const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66];
            const duration = 0.5;
            let time = this.ctx.currentTime;

            const playLoop = () => {
                if (!this.bgmPlaying) return;
                for (let i = 0; i < notes.length; i++) {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = notes[i];
                    gain.gain.setValueAtTime(0.15, time + i * duration);
                    gain.gain.exponentialRampToValueAtTime(0.01, time + (i + 1) * duration);
                    osc.connect(gain);
                    gain.connect(this.bgmGain);
                    osc.start(time + i * duration);
                    osc.stop(time + (i + 1) * duration);
                }
                time += notes.length * duration;
                this.bgmTimeout = setTimeout(playLoop, notes.length * duration * 1000);
            };

            this.bgmPlaying = true;
            playLoop();
        }

        stopBGM() {
            this.bgmPlaying = false;
            if (this.bgmTimeout) clearTimeout(this.bgmTimeout);
        }

        playSound(type) {
            if (!this.ctx) this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            switch(type) {
                case 'select':
                    osc.frequency.value = 523.25;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.15);
                    break;
                case 'success':
                    osc.frequency.value = 659.25;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                    osc.start();
                    setTimeout(() => {
                        const osc2 = this.ctx.createOscillator();
                        const gain2 = this.ctx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(this.ctx.destination);
                        osc2.frequency.value = 783.99;
                        osc2.type = 'sine';
                        gain2.gain.setValueAtTime(0.3, this.ctx.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                        osc2.start();
                        osc2.stop(this.ctx.currentTime + 0.2);
                    }, 100);
                    osc.stop(this.ctx.currentTime + 0.2);
                    break;
                case 'error':
                    osc.frequency.value = 200;
                    osc.type = 'triangle';
                    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.3);
                    break;
                case 'victory':
                    const victoryNotes = [523.25, 659.25, 783.99, 1046.50];
                    victoryNotes.forEach((freq, i) => {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.connect(g);
                        g.connect(this.ctx.destination);
                        o.frequency.value = freq;
                        o.type = 'sine';
                        g.gain.setValueAtTime(0.25, this.ctx.currentTime + i * 0.15);
                        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.15 + 0.3);
                        o.start(this.ctx.currentTime + i * 0.15);
                        o.stop(this.ctx.currentTime + i * 0.15 + 0.3);
                    });
                    break;
                case 'move':
                    osc.frequency.value = 300;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.08);
                    break;
                case 'bump':
                    osc.frequency.value = 150;
                    osc.type = 'triangle';
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.15);
                    break;
            }
        }
    }

    // ==================== Tool Registry ====================
    class ToolRegistry {
        constructor() {
            this.items = new Map();
        }
        register(id, item) { this.items.set(id, item); }
        get(id) { return this.items.get(id); }
        list() { return Array.from(this.items.values()); }
        has(id) { return this.items.has(id); }
    }

    const ITEM_DEFS = [
        { id: 'shape_hint', name: '形状提示', desc: '显示目标形状轮廓', cost: 2, game: 'shape', effect: 'hint' },
        { id: 'time_pause', name: '时间暂停', desc: '本关暂停倒计时', cost: 3, game: 'shape', effect: 'pause' },
        { id: 'color_magnifier', name: '颜色放大镜', desc: '高亮同色糖果', cost: 2, game: 'color', effect: 'highlight' },
        { id: 'sort_assist', name: '排序助手', desc: '自动找到匹配对', cost: 3, game: 'color', effect: 'assist' },
        { id: 'map_fragment', name: '地图碎片', desc: '显示路径3步', cost: 2, game: 'maze', effect: 'path' },
        { id: 'wall_soften', name: '穿墙术', desc: '穿墙一次', cost: 3, game: 'maze', effect: 'phase' },
        { id: 'time_slow', name: '减速沙漏', desc: '全局时间减速50%', cost: 8, game: 'all', effect: 'slow' },
        { id: 'double_points', name: '双倍积分', desc: '下次完成双倍星星', cost: 12, game: 'all', effect: 'double' },
        { id: 'shield', name: '护盾', desc: '免疫一次失误', cost: 10, game: 'all', effect: 'shield' },
        { id: 'reveal_answer', name: '答案之书', desc: '显示解法提示', cost: 6, game: 'all', effect: 'reveal' },
    ];

    const itemRegistry = new ToolRegistry();
    ITEM_DEFS.forEach(item => itemRegistry.register(item.id, item));

    // ==================== Star Manager ====================
    class StarManager {
        constructor() {
            this.key = 'preschool_puzzle_stars';
            this.invKey = 'preschool_puzzle_inventory';
            this.dailyKey = 'preschool_puzzle_last_login';
            this.streakKey = 'preschool_puzzle_login_streak';
        }
        getStars() {
            try { return parseInt(localStorage.getItem(this.key) || '0'); } catch { return 0; }
        }
        addStars(count) {
            const cur = this.getStars();
            localStorage.setItem(this.key, String(cur + count));
            return this.getStars();
        }
        spendStars(count) {
            const cur = this.getStars();
            if (cur < count) return false;
            localStorage.setItem(this.key, String(cur - count));
            return true;
        }
        getInventory() {
            try { return JSON.parse(localStorage.getItem(this.invKey) || '{}'); } catch { return {}; }
        }
        addItem(itemId) {
            const inv = this.getInventory();
            inv[itemId] = (inv[itemId] || 0) + 1;
            localStorage.setItem(this.invKey, JSON.stringify(inv));
        }
        useItem(itemId) {
            const inv = this.getInventory();
            if (!inv[itemId] || inv[itemId] <= 0) return false;
            inv[itemId]--;
            if (inv[itemId] <= 0) delete inv[itemId];
            localStorage.setItem(this.invKey, JSON.stringify(inv));
            return true;
        }
        hasItem(itemId) {
            const inv = this.getInventory();
            return (inv[itemId] || 0) > 0;
        }
        getItemCount(itemId) {
            return this.getInventory()[itemId] || 0;
        }
        // Daily bonus
        canClaimDailyBonus() {
            const today = new Date().toDateString();
            const last = localStorage.getItem(this.dailyKey);
            return last !== today;
        }
        claimDailyBonus() {
            if (!this.canClaimDailyBonus()) return false;
            const today = new Date().toDateString();
            localStorage.setItem(this.dailyKey, today);
            // Update streak
            const lastDate = localStorage.getItem(this.dailyKey + '_date');
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yStr = yesterday.toDateString();
            let streak = 1;
            if (lastDate === yStr) {
                streak = parseInt(localStorage.getItem(this.streakKey) || '0') + 1;
            }
            localStorage.setItem(this.streakKey, String(streak));
            localStorage.setItem(this.dailyKey + '_date', today);
            this.addStars(1);
            // Every 7 days give random item
            if (streak > 0 && streak % 7 === 0) {
                const items = ['shape_hint', 'time_pause', 'color_magnifier', 'sort_assist', 'map_fragment', 'wall_soften'];
                this.addItem(items[Math.floor(Math.random() * items.length)]);
            }
            return true;
        }
        getStreak() {
            return parseInt(localStorage.getItem(this.streakKey) || '0');
        }
        // Gacha: random item for 10 stars
        gacha() {
            if (!this.spendStars(10)) return null;
            const items = ['shape_hint', 'time_pause', 'color_magnifier', 'sort_assist', 'map_fragment', 'wall_soften'];
            const item = items[Math.floor(Math.random() * items.length)];
            this.addItem(item);
            return item;
        }
        // Upgrade: 3 same items -> upgraded version
        canUpgrade(itemId) {
            return this.getItemCount(itemId) >= 3 && !itemId.includes('_plus');
        }
        upgrade(itemId) {
            if (!this.canUpgrade(itemId)) return null;
            const inv = this.getInventory();
            inv[itemId] -= 3;
            if (inv[itemId] <= 0) delete inv[itemId];
            const plusId = itemId + '_plus';
            inv[plusId] = (inv[plusId] || 0) + 1;
            localStorage.setItem(this.invKey, JSON.stringify(inv));
            return plusId;
        }
        // Use upgrade ticket (instant upgrade, no materials)
        useUpgradeTicket(itemId) {
            if (!itemId.includes('_plus') && this.getItemCount(itemId) >= 1) {
                const inv = this.getInventory();
                inv[itemId]--;
                if (inv[itemId] <= 0) delete inv[itemId];
                const plusId = itemId + '_plus';
                inv[plusId] = (inv[plusId] || 0) + 1;
                localStorage.setItem(this.invKey, JSON.stringify(inv));
                return plusId;
            }
            return null;
        }
        getUpgradeTicketCount() {
            return this.getInventory()['upgrade_ticket'] || 0;
        }
        // Count unique item types (excluding plus versions)
        getUniqueItemTypes() {
            const inv = this.getInventory();
            return Object.keys(inv).filter(k => !k.includes('_plus') && !k.includes('upgrade_ticket') && inv[k] > 0).length;
        }
        // Count total stars earned (tracked separately)
        getTotalStarsEarned() {
            return parseInt(localStorage.getItem('puzzle_total_stars') || '0');
        }
        addTotalStarsEarned(n) {
            const cur = this.getTotalStarsEarned();
            localStorage.setItem('puzzle_total_stars', String(cur + n));
        }
        // Game completion counters
        getGameCompleteCount(gameId) {
            return parseInt(localStorage.getItem('puzzle_complete_' + gameId) || '0');
        }
        incrementGameComplete(gameId) {
            const cur = this.getGameCompleteCount(gameId);
            localStorage.setItem('puzzle_complete_' + gameId, String(cur + 1));
        }
        // Gacha counter
        getGachaCount() {
            return parseInt(localStorage.getItem('puzzle_gacha_count') || '0');
        }
        incrementGacha() {
            const cur = this.getGachaCount();
            localStorage.setItem('puzzle_gacha_count', String(cur + 1));
        }
    }

    // ==================== Achievement Manager ====================
    class AchievementManager {
        constructor(starManager) {
            this.starManager = starManager;
            this.key = 'puzzle_achievements';
            this.achievements = [
                { id: 'first_win', name: '初学者', desc: '完成任意游戏', icon: '🌟', reward: { type: 'stars', val: 2 }, condition: () => {
                    const s = this.starManager.getGameCompleteCount('shape');
                    const c = this.starManager.getGameCompleteCount('color');
                    const m = this.starManager.getGameCompleteCount('maze');
                    return s + c + m >= 1;
                }},
                { id: 'shape_master', name: '形状大师', desc: '完成形状游戏5次', icon: '🔷', reward: { type: 'stars', val: 3 }, condition: () => this.starManager.getGameCompleteCount('shape') >= 5 },
                { id: 'color_master', name: '颜色大师', desc: '完成颜色游戏5次', icon: '🌈', reward: { type: 'stars', val: 3 }, condition: () => this.starManager.getGameCompleteCount('color') >= 5 },
                { id: 'maze_master', name: '迷宫大师', desc: '完成迷宫游戏5次', icon: '🗺️', reward: { type: 'stars', val: 3 }, condition: () => this.starManager.getGameCompleteCount('maze') >= 5 },
                { id: 'collector', name: '收藏家', desc: '拥有全部6种道具', icon: '🏆', reward: { type: 'stars', val: 5 }, condition: () => this.starManager.getUniqueItemTypes() >= 6 },
                { id: 'streak_7', name: '连续签到', desc: '连续签到7天', icon: '📅', reward: { type: 'item', val: 'shape_hint' }, condition: () => this.starManager.getStreak() >= 7 },
                { id: 'star_50', name: '星星收集者', desc: '累计获得50⭐', icon: '💎', reward: { type: 'stars', val: 5 }, condition: () => this.starManager.getTotalStarsEarned() >= 50 },
                { id: 'gacha_10', name: '扭蛋达人', desc: '扭蛋10次', icon: '🎰', reward: { type: 'item', val: 'upgrade_ticket' }, condition: () => this.starManager.getGachaCount() >= 10 },
            ];
            this.suitSets = [
                { id: 'all_plus', name: '全能助手', desc: '拥有全部6种强化版道具', reward: { type: 'stars', val: 10 }, condition: () => {
                    const plusItems = ['shape_hint_plus', 'time_pause_plus', 'color_magnifier_plus', 'sort_assist_plus', 'map_fragment_plus', 'wall_soften_plus'];
                    return plusItems.every(i => this.starManager.getItemCount(i) > 0);
                }},
                { id: 'starter', name: '入门套装', desc: '首次拥有3种以上道具', reward: { type: 'stars', val: 2 }, condition: () => this.starManager.getUniqueItemTypes() >= 3 },
            ];
        }
        load() {
            try { return JSON.parse(localStorage.getItem(this.key) || '{}'); } catch { return {}; }
        }
        save(data) {
            localStorage.setItem(this.key, JSON.stringify(data));
        }
        checkAndAward() {
            const data = this.load();
            const all = [...this.achievements, ...this.suitSets];
            all.forEach(a => {
                if (!data[a.id] && a.condition()) {
                    data[a.id] = true;
                    this.award(a);
                }
            });
            this.save(data);
            return data;
        }
        award(ach) {
            if (ach.reward.type === 'stars') {
                this.starManager.addStars(ach.reward.val);
                this.starManager.addTotalStarsEarned(ach.reward.val);
            } else if (ach.reward.type === 'item') {
                this.starManager.addItem(ach.reward.val);
            }
        }
        isUnlocked(id) {
            return this.load()[id] === true;
        }
    }

    // ==================== Achievement Panel ====================
    class AchievementPanel {
        constructor(ctx, achievementManager, onClose) {
            this.ctx = ctx;
            this.achievementManager = achievementManager;
            this.onClose = onClose;
        }
        handleClick(x, y) {
            if (y >= 530 && y <= 570 && x >= 350 && x <= 450) {
                this.onClose();
            }
        }
        draw() {
            const ctx = this.ctx;
            ctx.fillStyle = '#FFF8E7';
            ctx.fillRect(0, 0, 800, 600);
            // Title
            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🏆 成就', 400, 60);
            // Achievements
            const all = [...this.achievementManager.achievements, ...this.achievementManager.suitSets];
            let y = 120;
            all.forEach((ach) => {
                const unlocked = this.achievementManager.isUnlocked(ach.id);
                ctx.fillStyle = unlocked ? '#FFF9C4' : '#F5F5F5';
                ctx.beginPath();
                ctx.roundRect(100, y, 600, 60, 10);
                ctx.fill();
                ctx.strokeStyle = unlocked ? '#FFD700' : '#CCC';
                ctx.lineWidth = 2;
                ctx.stroke();
                // Icon
                ctx.font = '28px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(ach.icon, 120, y + 38);
                // Name
                ctx.fillStyle = unlocked ? '#333' : '#888';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(ach.name, 170, y + 25);
                // Desc
                ctx.fillStyle = '#888';
                ctx.font = '14px Arial';
                ctx.fillText(ach.desc, 170, y + 45);
                // Reward
                if (unlocked) {
                    ctx.fillStyle = '#4CAF50';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'right';
                    const rewardText = ach.reward.type === 'stars' ? `+${ach.reward.val}★` : `+${ach.reward.val}`;
                    ctx.fillText(rewardText, 680, y + 35);
                    ctx.textAlign = 'left';
                }
                y += 70;
            });
            // Close button
            ctx.fillStyle = '#9C27B0';
            ctx.beginPath();
            ctx.roundRect(350, 530, 100, 40, 10);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('关闭', 400, 558);
        }
    }

    // ==================== Item Shop ====================
    class ItemShop {
        constructor(canvas, ctx, audio, starManager, achievementManager, onClose) {
            this.canvas = canvas;
            this.ctx = ctx;
            this.audio = audio;
            this.starManager = starManager;
            this.achievementManager = achievementManager;
            this.onClose = onClose;
            this.buttons = [];
            this.buyResults = [];
            this.resultTimer = 0;
            this.gachaResult = null;
            this.gachaTimer = 0;
            this.upgradeResult = null;
            this.upgradeTimer = 0;
            this.initButtons();
            canvas.addEventListener('click', e => this.handleClick(e));
        }
        initButtons() {
            const items = itemRegistry.list();
            this.buttons = [];
            let y = 160;
            items.forEach((item, i) => {
                const owned = this.starManager.getItemCount(item.id);
                const canAfford = this.starManager.getStars() >= item.cost;
                const canUpgrade = this.starManager.canUpgrade(item.id);
                this.buttons.push({
                    x: 400, y: y, width: 360, height: 60,
                    item: item, owned: owned, canAfford: canAfford, canUpgrade: canUpgrade
                });
                y += 70;
            });
            this.backBtn = { x: 400, y: 570, width: 120, height: 44 };
            this.gachaBtn = { x: 400, y: 115, width: 160, height: 40 };
        }
        handleClick(e) {
            const rect = this.canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (800 / rect.width);
            const y = (e.clientY - rect.top) * (600 / rect.height);
            // Gacha button
            if (x >= this.gachaBtn.x - this.gachaBtn.width/2 && x <= this.gachaBtn.x + this.gachaBtn.width/2 &&
                y >= this.gachaBtn.y - this.gachaBtn.height/2 && y <= this.gachaBtn.y + this.gachaBtn.height/2) {
                if (this.starManager.getStars() >= 10) {
                    const result = this.starManager.gacha();
                    if (result) {
                        this.starManager.incrementGacha();
                        this.achievementManager.checkAndAward();
                        const itemDef = ITEM_DEFS.find(i => i.id === result);
                        this.gachaResult = itemDef ? itemDef.name : result;
                        this.gachaTimer = 120;
                        this.audio.playSound('success');
                    }
                } else {
                    this.audio.playSound('error');
                }
                return;
            }
            // Back button
            if (x >= this.backBtn.x - 60 && x <= this.backBtn.x + 60 &&
                y >= this.backBtn.y - 22 && y <= this.backBtn.y + 22) {
                this.audio.playSound('select');
                this.onClose();
                return;
            }
            // Item buttons
            for (const btn of this.buttons) {
                if (x >= btn.x - btn.width/2 && x <= btn.x + btn.width/2 &&
                    y >= btn.y - btn.height/2 && y <= btn.y + btn.height/2) {
                    // Upgrade check (click on owned item with 3+)
                    if (btn.canUpgrade && !btn.owned) {
                        // Can't happen, but safety
                    }
                    if (btn.owned >= 3 && this.starManager.canUpgrade(btn.item.id)) {
                        const upgraded = this.starManager.upgrade(btn.item.id);
                        if (upgraded) {
                            this.upgradeResult = btn.item.name + ' → ' + upgraded;
                            this.upgradeTimer = 120;
                            this.audio.playSound('success');
                            this.initButtons();
                        }
                        return;
                    }
                    if (!btn.owned && btn.canAfford) {
                        if (this.starManager.spendStars(btn.item.cost)) {
                            this.starManager.addItem(btn.item.id);
                            btn.owned = true;
                            btn.canAfford = this.starManager.getStars() >= btn.item.cost;
                            this.audio.playSound('success');
                            const itemDef = ITEM_DEFS.find(i => i.id === btn.item.id);
                            this.buyResults.push({ text: `获得 ${itemDef ? itemDef.name : btn.item.id}!`, color: '#4CAF50', y: btn.y });
                            this.resultTimer = 60;
                        } else {
                            this.audio.playSound('error');
                        }
                    } else if (!btn.owned) {
                        this.audio.playSound('error');
                    }
                    return;
                }
            }
        }
        update() {
            if (this.resultTimer > 0) this.resultTimer--;
            if (this.gachaTimer > 0) this.gachaTimer--;
            if (this.upgradeTimer > 0) this.upgradeTimer--;
        }
        draw() {
            const ctx = this.ctx;
            ctx.clearRect(0, 0, 800, 600);
            // BG
            ctx.fillStyle = '#FFF8E7';
            ctx.fillRect(0, 0, 800, 600);
            // Title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('道具商店', 400, 60);
            // Stars balance
            const stars = this.starManager.getStars();
            ctx.font = '22px Arial';
            ctx.fillText(`★ ${stars}`, 400, 95);
            // Gacha button
            const canGacha = stars >= 10;
            ctx.fillStyle = canGacha ? '#FFD700' : '#CCC';
            ctx.beginPath();
            ctx.roundRect(this.gachaBtn.x - this.gachaBtn.width/2, this.gachaBtn.y - this.gachaBtn.height/2, this.gachaBtn.width, this.gachaBtn.height, 10);
            ctx.fill();
            ctx.fillStyle = canGacha ? '#333' : '#888';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('🎰 扭蛋 10★', this.gachaBtn.x, this.gachaBtn.y + 6);
            // Gacha result
            if (this.gachaTimer > 0) {
                ctx.globalAlpha = this.gachaTimer / 120;
                ctx.fillStyle = '#FF6B6B';
                ctx.font = 'bold 24px Arial';
                ctx.fillText(`恭喜获得 ${this.gachaResult}!`, 400, 150);
                ctx.globalAlpha = 1;
            }
            // Items
            this.buttons.forEach(btn => {
                const item = btn.item;
                const owned = this.starManager.getItemCount(item.id);
                const canUpgrade = this.starManager.canUpgrade(item.id);
                // BG
                ctx.fillStyle = canUpgrade ? '#FFF9C4' : (owned ? '#E8F5E9' : (this.starManager.getStars() >= item.cost ? '#FFF' : '#F5F5F5'));
                ctx.beginPath();
                ctx.roundRect(btn.x - btn.width/2, btn.y - btn.height/2, btn.width, btn.height, 12);
                ctx.fill();
                ctx.strokeStyle = canUpgrade ? '#FFC107' : (owned ? '#4CAF50' : (this.starManager.getStars() >= item.cost ? COLORS.primary : '#CCC'));
                ctx.lineWidth = 2;
                ctx.stroke();
                // Upgrade hint
                if (canUpgrade) {
                    ctx.fillStyle = '#FF8F00';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('点击升级(+1)', btn.x, btn.y - 22);
                }
                // Name
                ctx.fillStyle = COLORS.text;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(item.name, btn.x - 160, btn.y - 8);
                // Desc
                ctx.font = '16px Arial';
                ctx.fillStyle = '#888';
                ctx.fillText(item.desc, btn.x - 160, btn.y + 18);
                // Cost / owned
                ctx.textAlign = 'right';
                if (owned) {
                    ctx.fillStyle = '#4CAF50';
                    ctx.font = 'bold 18px Arial';
                    ctx.fillText(`已拥有 ×${owned}`, btn.x + 160, btn.y + 5);
                } else {
                    ctx.fillStyle = this.starManager.getStars() >= item.cost ? '#FFB347' : '#E57373';
                    ctx.font = 'bold 18px Arial';
                    ctx.fillText(`★ ${item.cost}`, btn.x + 160, btn.y + 5);
                }
            });
            // Upgrade result
            if (this.upgradeTimer > 0) {
                ctx.globalAlpha = this.upgradeTimer / 120;
                ctx.fillStyle = '#FFC107';
                ctx.font = 'bold 22px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`升级成功: ${this.upgradeResult}`, 400, 530);
                ctx.globalAlpha = 1;
            }
            // Back btn
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.roundRect(this.backBtn.x - 60, this.backBtn.y - 22, 120, 44, 10);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('返回', this.backBtn.x, this.backBtn.y + 6);
            // Buy results
            if (this.resultTimer > 0) {
                this.buyResults = this.buyResults.filter(r => {
                    ctx.globalAlpha = this.resultTimer / 60;
                    ctx.fillStyle = r.color;
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(r.text, 400, r.y - (60 - this.resultTimer) * 0.5);
                    ctx.globalAlpha = 1;
                    return this.resultTimer > 0;
                });
            }
        }
    }

    // ==================== Save Manager ====================
    class SaveManager {
        constructor() {
            this.key = 'preschool_puzzle_progress';
        }

        load() {
            try {
                const data = localStorage.getItem(this.key);
                return data ? JSON.parse(data) : { completed: {} };
            } catch {
                return { completed: {} };
            }
        }

        save(data) {
            try {
                localStorage.setItem(this.key, JSON.stringify(data));
            } catch {}
        }

        markCompleted(gameId) {
            const data = this.load();
            data.completed[gameId] = true;
            this.save(data);
        }

        isCompleted(gameId) {
            return this.load().completed[gameId] || false;
        }
    }

    // ==================== Particle System ====================
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6 - 3;
            this.color = color;
            this.life = 1;
            this.decay = 0.02 + Math.random() * 0.02;
            this.size = 4 + Math.random() * 4;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.15;
            this.life -= this.decay;
        }

        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // ==================== Shape Renderer ====================
    function drawShape(ctx, type, x, y, size, color, stroke = false) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.strokeStyle = stroke ? '#333' : color;
        ctx.lineWidth = stroke ? 3 : 0;

        switch(type) {
            case 'circle':
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.fill();
                if (stroke) ctx.stroke();
                break;
            case 'triangle':
                ctx.beginPath();
                ctx.moveTo(x, y - size / 2);
                ctx.lineTo(x + size / 2, y + size / 2);
                ctx.lineTo(x - size / 2, y + size / 2);
                ctx.closePath();
                ctx.fill();
                if (stroke) ctx.stroke();
                break;
            case 'square':
                const s = size * 0.8;
                ctx.fillRect(x - s / 2, y - s / 2, s, s);
                if (stroke) ctx.strokeRect(x - s / 2, y - s / 2, s, s);
                break;
            case 'rectangle':
                ctx.fillRect(x - size * 0.6, y - size * 0.35, size * 1.2, size * 0.7);
                if (stroke) ctx.strokeRect(x - size * 0.6, y - size * 0.35, size * 1.2, size * 0.7);
                break;
            case 'heart':
                ctx.beginPath();
                const hs = size / 2;
                ctx.moveTo(x, y + hs * 0.3);
                ctx.bezierCurveTo(x - hs, y - hs * 0.5, x - hs, y + hs * 0.3, x, y + hs);
                ctx.bezierCurveTo(x + hs, y + hs * 0.3, x + hs, y - hs * 0.5, x, y + hs * 0.3);
                ctx.fill();
                break;
            case 'star':
                const spikes = 5;
                const outerR = size / 2;
                const innerR = size / 4;
                ctx.beginPath();
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const angle = (i * Math.PI / spikes) - Math.PI / 2;
                    const px = x + Math.cos(angle) * r;
                    const py = y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                break;
        }
        ctx.restore();
    }

    // ==================== Home Screen ====================
    class HomeScreen {
        constructor(canvas, audio, saveManager, starManager, onSelectGame, onOpenShop, achievementManager, onOpenAchievements) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.starManager = starManager;
            this.onSelectGame = onSelectGame;
            this.onOpenShop = onOpenShop;
            this.achievementManager = achievementManager;
            this.onOpenAchievements = onOpenAchievements;
            this.audioInitialized = false;
            this.games = [
                { id: 'shape', name: '形状匹配', icon: 'shape' },
                { id: 'color', name: '颜色分类', icon: 'color' },
                { id: 'maze', name: '简单迷宫', icon: 'maze' }
            ];
            this.buttons = [];
            this.hoveredIndex = -1;
            this.scale = 1;
            this.particles = [];
            this.shopHovered = false;
            this.init();
        }

        init() {
            this.setupButtons();
            this.canvas.addEventListener('click', (e) => this.handleClick(e));
            this.canvas.addEventListener('mousemove', (e) => this.handleMove(e));
        }

        setupButtons() {
            const startX = 150;
            const gap = 200;
            this.buttons = this.games.map((game, i) => ({
                x: startX + i * gap,
                y: 280,
                width: 150,
                height: 180,
                game: game,
                hovered: false
            }));
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            const scaleX = this.canvas.width / rect.width;
            const scaleY = this.canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        handleClick(e) {
            const pos = this.getMousePos(e);
            // Daily bonus button (top left)
            if (pos.x >= 20 && pos.x <= 150 && pos.y >= 20 && pos.y <= 64) {
                if (this.starManager.canClaimDailyBonus()) {
                    this.starManager.claimDailyBonus();
                    this.audio.playSound('success');
                }
                return;
            }
            // Shop button (top right)
            if (pos.x >= 680 && pos.x <= 780 && pos.y >= 20 && pos.y <= 70) {
                this.audio.playSound('select');
                this.onOpenShop();
                return;
            }
            // Achievement button (top center)
            if (pos.x >= 540 && pos.x <= 620 && pos.y >= 20 && pos.y <= 64) {
                this.audio.playSound('select');
                this.onOpenAchievements();
                return;
            }
            for (let i = 0; i < this.buttons.length; i++) {
                const btn = this.buttons[i];
                if (pos.x >= btn.x - btn.width/2 && pos.x <= btn.x + btn.width/2 &&
                    pos.y >= btn.y - btn.height/2 && pos.y <= btn.y + btn.height/2) {
                    if (!this.audioInitialized) {
                        this.audio.init();
                        this.audio.playBGM();
                        this.audioInitialized = true;
                    }
                    this.audio.playSound('select');
                    this.onSelectGame(this.games[i].id);
                    return;
                }
            }
        }

        handleMove(e) {
            const pos = this.getMousePos(e);
            // Shop button hover
            this.shopHovered = pos.x >= 680 && pos.x <= 780 && pos.y >= 20 && pos.y <= 70;
            let found = -1;
            for (let i = 0; i < this.buttons.length; i++) {
                const btn = this.buttons[i];
                btn.hovered = pos.x >= btn.x - btn.width/2 && pos.x <= btn.x + btn.width/2 &&
                              pos.y >= btn.y - btn.height/2 && pos.y <= btn.y + btn.height/2;
                if (btn.hovered) found = i;
            }
            this.hoveredIndex = found;
            this.canvas.style.cursor = (this.shopHovered || found >= 0) ? 'pointer' : 'default';
        }

        drawBackground() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Draw decorative clouds
            ctx.fillStyle = '#E8F4FF';
            this.drawCloud(100, 80, 50);
            this.drawCloud(650, 100, 40);
            this.drawCloud(350, 60, 35);

            // Draw title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('幼儿益智解谜游戏', 400, 120);

            // Draw stars balance (top right)
            const stars = this.starManager.getStars();
            ctx.fillStyle = '#FFB347';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`★ ${stars}`, 730, 52);

            // Daily bonus button (top left)
            if (this.starManager.canClaimDailyBonus()) {
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.roundRect(20, 20, 130, 44, 10);
                ctx.fill();
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('📅 每日签到', 85, 50);
                ctx.textAlign = 'left';
            } else {
                const streak = this.starManager.getStreak();
                if (streak > 0) {
                    ctx.fillStyle = '#888';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'left';
                    ctx.fillText(`连续${streak}天`, 25, 50);
                }
            }

            // Shop button (top right)
            ctx.fillStyle = this.shopHovered ? '#E68A00' : COLORS.primary;
            ctx.beginPath();
            ctx.roundRect(680, 20, 100, 50, 12);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('商店', 730, 52);

            // Achievement button (top center)
            const achUnlocked = Object.values(this.achievementManager.load()).filter(v => v).length;
            const achTotal = this.achievementManager.achievements.length + this.achievementManager.suitSets.length;
            ctx.fillStyle = '#9C27B0';
            ctx.beginPath();
            ctx.roundRect(540, 20, 80, 44, 10);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🏆', 560, 36);
            ctx.font = 'bold 12px Arial';
            ctx.fillText(`${achUnlocked}/${achTotal}`, 595, 36);

            // Draw stars
            ctx.fillStyle = '#FFD700';
            this.drawStar(150, 100, 15);
            this.drawStar(650, 80, 12);
            this.drawStar(380, 90, 10);
        }
        drawCloud(x, y, size) {
            const ctx = this.ctx;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        drawStar(x, y, size) {
            const ctx = this.ctx;
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const r = i % 2 === 0 ? size : size * 0.4;
                const angle = (i * Math.PI / 5) - Math.PI / 2;
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
        }

        drawGameIcon(game, x, y, hovered) {
            const ctx = this.ctx;
            const scale = hovered ? 1.08 : 1;
            const s = scale;

            ctx.save();
            ctx.translate(x, y);
            ctx.scale(s, s);

            // Card background
            ctx.fillStyle = hovered ? '#FFF' : '#F5F5F5';
            ctx.strokeStyle = hovered ? COLORS.primary : '#DDD';
            ctx.lineWidth = hovered ? 4 : 2;
            this.roundRect(-60, -70, 120, 140, 16);
            ctx.fill();
            ctx.stroke();

            // Icon
            const iconY = -15;
            switch(game.icon) {
                case 'shape':
                    const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
                    SHAPES.forEach((shape, i) => {
                        const col = i % 3;
                        const row = Math.floor(i / 3);
                        drawShape(ctx, shape, -30 + col * 30, iconY - 10 + row * 25, 20, colors[i]);
                    });
                    break;
                case 'color':
                    const colors2 = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];
                    colors2.forEach((c, i) => {
                        const col = i % 2;
                        const row = Math.floor(i / 2);
                        ctx.fillStyle = c;
                        ctx.beginPath();
                        ctx.arc(-20 + col * 40, iconY - 10 + row * 30, 12, 0, Math.PI * 2);
                        ctx.fill();
                        // Shine
                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.beginPath();
                        ctx.arc(-24 + col * 40, iconY - 14 + row * 30, 4, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    break;
                case 'maze':
                    // Simple maze icon
                    ctx.strokeStyle = COLORS.primary;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(-35, -35);
                    ctx.lineTo(-5, -35);
                    ctx.lineTo(-5, -15);
                    ctx.lineTo(15, -15);
                    ctx.lineTo(15, 5);
                    ctx.lineTo(35, 5);
                    ctx.stroke();
                    // Rabbit
                    ctx.fillStyle = '#FFE4E1';
                    ctx.beginPath();
                    ctx.arc(-25, 20, 15, 0, Math.PI * 2);
                    ctx.fill();
                    // Ears
                    ctx.beginPath();
                    ctx.ellipse(-32, 5, 5, 12, -0.2, 0, Math.PI * 2);
                    ctx.ellipse(-18, 5, 5, 12, 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    // Carrot
                    ctx.fillStyle = '#FF6B00';
                    ctx.beginPath();
                    ctx.moveTo(-25, 28);
                    ctx.lineTo(-30, 45);
                    ctx.lineTo(-20, 45);
                    ctx.closePath();
                    ctx.fill();
                    break;
            }

            // Game name
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(game.name, 0, 85);

            // Completed checkmark
            if (this.saveManager.isCompleted(game.id)) {
                ctx.fillStyle = COLORS.success;
                ctx.beginPath();
                ctx.arc(50, -60, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(42, -60);
                ctx.lineTo(48, -54);
                ctx.lineTo(58, -68);
                ctx.stroke();
            }

            ctx.restore();
        }

        roundRect(x, y, w, h, r) {
            const ctx = this.ctx;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        update() {
            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            this.drawBackground();
            this.buttons.forEach((btn, i) => {
                this.drawGameIcon(btn.game, btn.x, btn.y, btn.hovered);
            });
            this.particles.forEach(p => p.draw(this.ctx));
        }
    }

    // ==================== Shape Match Game ====================
    class ShapeMatchGame {
        constructor(canvas, audio, saveManager, starManager, onBack, onComplete) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.starManager = starManager;
            this.onBack = onBack;
            this.onComplete = onComplete;
            this.particles = [];
            this.selectedShape = null;
            this.matchedShapes = [];
            this.animatingShape = null;
            this.animProgress = 0;
            this.shapes = [];
            this.gridCells = [];
// Item effects
            this.hintActive = false;
            this.hintTimer = 0;
            this.paused = false;
            this.timeSlow = false;
            this.timeSlowTimer = 0;
            this.doublePoints = false;
            this.shieldActive = false;
            this.revealActive = false;
            this.revealTimer = 0;
            // Item buttons
            this.itemButtons = [];
            this.init();
        }

        init() {
            this.shapes = this.shuffle([...SHAPES]);
            this.gridCells = this.shuffle([...Array(6).keys()]);
            this.selectedShape = null;
            this.selectedShapeIndex = null;
            this.matchedShapes = [];
            this.slotContents = [-1, -1, -1, -1, -1, -1];
            this.particles = [];
            this.hintActive = false;
            this.hintTimer = 0;
            this.paused = false;
            this.timeSlow = false;
            this.timeSlowTimer = 0;
            this.doublePoints = false;
            this.shieldActive = false;
            this.revealActive = false;
            this.revealTimer = 0;
            this.setupItemButtons();

            this.canvas.onclick = (e) => this.handleClick(e);
        }

        setupItemButtons() {
            this.itemButtons = [];
            const items = [
                { id: 'shape_hint', label: '💡', x: 720, y: 30 },
                { id: 'time_pause', label: '⏸', x: 770, y: 30 },
                { id: 'time_slow', label: '⏳', x: 720, y: 70 },
                { id: 'double_points', label: '✖2', x: 770, y: 70 },
                { id: 'shield', label: '🛡', x: 720, y: 110 },
                { id: 'reveal_answer', label: '📖', x: 770, y: 110 }
            ];
            items.forEach(item => {
                const count = this.starManager.getItemCount(item.id);
                if (count > 0) {
                    this.itemButtons.push({ ...item, count });
                }
            });
        }

        useItem(itemId) {
            if (!this.starManager.hasItem(itemId)) return false;
            this.starManager.useItem(itemId);
            if (itemId === 'shape_hint') {
                this.hintActive = true;
                this.hintTimer = 300;
                this.audio.playSound('select');
            } else if (itemId === 'time_pause') {
                this.paused = !this.paused;
                this.audio.playSound('select');
            } else if (itemId === 'time_slow') {
                this.timeSlow = true;
                this.timeSlowTimer = 600;
                this.audio.playSound('select');
            } else if (itemId === 'double_points') {
                this.doublePoints = true;
                this.setupItemButtons();
                return true;
            } else if (itemId === 'shield') {
                this.shieldActive = true;
                this.audio.playSound('select');
            } else if (itemId === 'reveal_answer') {
                this.revealActive = true;
                this.revealTimer = 300;
                this.audio.playSound('select');
            }
            this.setupItemButtons();
            return true;
        }

        shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (800 / rect.width),
                y: (e.clientY - rect.top) * (600 / rect.height)
            };
        }

        handleClick(e) {
            const pos = this.getMousePos(e);

            // Check item buttons
            for (const btn of this.itemButtons) {
                const dx = pos.x - btn.x;
                const dy = pos.y - btn.y;
                if (Math.abs(dx) < 25 && Math.abs(dy) < 20) {
                    this.useItem(btn.id);
                    return;
                }
            }

            // Check back button
            if (pos.x < 70 && pos.y < 50) {
                this.audio.playSound('select');
                this.onBack();
                return;
            }

            // Check shape clicks
            for (let i = 0; i < 6; i++) {
                const sx = 120 + (i % 3) * 200;
                const sy = 150 + Math.floor(i / 3) * 100;
                const dist = Math.hypot(pos.x - sx, pos.y - sy);
                if (dist < 40 && !this.matchedShapes.includes(i)) {
                    this.audio.playSound('select');
                    this.selectedShape = this.shapes[i]; // Store shape TYPE, not position
                    this.selectedShapeIndex = i; // Also track position for matchedShapes check
                    return;
                }
            }

            // Check target slot clicks
            if (this.selectedShape !== null) {
                for (let i = 0; i < 6; i++) {
                    const tx = 120 + (i % 3) * 200;
                    const ty = 380 + Math.floor(i / 3) * 100;
                    const dist = Math.hypot(pos.x - tx, pos.y - ty);
                    if (dist < 40) {
                        // Match: selected shape type === target slot's expected shape type
                        if (this.selectedShape === SHAPES[this.gridCells[i]]) {
                            this.audio.playSound('success');
                            this.matchedShapes.push(this.selectedShapeIndex);
                            this.slotContents[i] = this.selectedShapeIndex; // Record filled slot
                            this.animatingShape = { from: this.selectedShapeIndex, to: i };
                            this.animProgress = 0;
                            // Spawn particles
                            for (let j = 0; j < 15; j++) {
                                this.particles.push(new Particle(tx, ty, ['#FFD700', '#FF6B6B', '#4ECDC4'][j % 3]));
                            }
                            this.selectedShape = null;
                            if (this.matchedShapes.length === 6) {
                                setTimeout(() => {
                                    this.audio.playSound('victory');
                                    this.saveManager.markCompleted('shape');
                                    this.onComplete();
                                }, 500);
                            }
                        } else {
                            if (this.shieldActive) {
                                this.shieldActive = false;
                                this.audio.playSound('select');
                            } else {
                                this.audio.playSound('error');
                            }
                        }
                        return;
                    }
                }
            }
        }

        update() {
            if (this.animatingShape) {
                this.animProgress += 0.05;
                if (this.animProgress >= 1) {
                    this.animatingShape = null;
                }
            }
            if (this.hintActive) {
                this.hintTimer--;
                if (this.hintTimer <= 0) this.hintActive = false;
            }
            if (this.timeSlow && this.timeSlowTimer > 0) {
                this.timeSlowTimer--;
                if (this.timeSlowTimer <= 0) this.timeSlow = false;
            }
            if (this.revealActive) {
                this.revealTimer--;
                if (this.revealTimer <= 0) this.revealActive = false;
            }
            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Item buttons (top right)
            this.itemButtons.forEach(btn => {
                ctx.fillStyle = COLORS.primary;
                ctx.beginPath();
                ctx.roundRect(btn.x - 25, btn.y - 20, 50, 40, 8);
                ctx.fill();
                ctx.fillStyle = '#FFF';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(btn.label, btn.x, btn.y + 6);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(`×${btn.count}`, btn.x + 15, btn.y - 8);
            });

            // Title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('形状匹配', 400, 60);

            // Back button
            this.drawBackButton();

            // Source shapes (top)
            const shapeColors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
            for (let i = 0; i < 6; i++) {
                const x = 120 + (i % 3) * 200;
                const y = 150 + Math.floor(i / 3) * 100;
                const isMatched = this.matchedShapes.includes(i);
                const isSelected = this.selectedShapeIndex === i;

                ctx.save();
                if (isSelected) {
                    ctx.shadowColor = COLORS.primary;
                    ctx.shadowBlur = 15;
                }
                drawShape(ctx, this.shapes[i], x, y, 60, isMatched ? '#CCC' : shapeColors[i], isSelected);
                ctx.restore();

                // Click hint
                if (isSelected && !isMatched) {
                    ctx.fillStyle = COLORS.text;
                    ctx.font = '14px Arial';
                    ctx.fillText('点击下方匹配位置', x, y + 50);
                }
            }

            // Target slots (bottom)
            for (let i = 0; i < 6; i++) {
                const x = 120 + (i % 3) * 200;
                const y = 380 + Math.floor(i / 3) * 100;
                const hasShape = this.animatingShape && this.animatingShape.to === i;
                const filledShapeIndex = this.slotContents[i];

                if (hasShape) {
                    // Animating shape
                    const progress = this.animProgress;
                    const fromShape = this.shapes[this.animatingShape.from];
                    const color = shapeColors[this.animatingShape.from];
                    drawShape(ctx, fromShape, x, y, 60 * (1 - progress * 0.3), color);
                } else if (filledShapeIndex >= 0) {
                    // Filled slot - show colored shape
                    const shapeType = this.shapes[filledShapeIndex];
                    drawShape(ctx, shapeType, x, y, 50, shapeColors[filledShapeIndex], false);
                } else {
                    // Empty slot - show expected shape outline in gray
                    const expectedShape = SHAPES[this.gridCells[i]];
                    drawShape(ctx, expectedShape, x, y, 50, '#CCC', false);
                    // Hint effect: dashed glow
                    if (this.hintActive) {
                        ctx.save();
                        ctx.strokeStyle = '#FFD700';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        ctx.arc(x, y, 35, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.restore();
                    }
                    // Reveal answer: show solution directly
                    if (this.revealActive) {
                        ctx.save();
                        ctx.strokeStyle = '#9C27B0';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(x, y, 35, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(156, 39, 176, 0.15)';
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // Shield indicator
            if (this.shieldActive) {
                ctx.save();
                ctx.strokeStyle = '#4CAF50';
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 4]);
                ctx.strokeRect(85, 135, 630, 380);
                ctx.setLineDash([]);
                ctx.fillStyle = '#4CAF50';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('🛡 护盾激活', 90, 155);
                ctx.restore();
            }

            // Progress
            ctx.fillStyle = COLORS.text;
            ctx.font = '20px Arial';
            ctx.fillText(`已完成: ${this.matchedShapes.length}/6`, 400, 560);

            this.particles.forEach(p => p.draw(ctx));
        }

        drawBackButton() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.arc(40, 40, 25, 0, Math.PI * 2);
            ctx.fill();
            // House icon
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(28, 45);
            ctx.lineTo(40, 28);
            ctx.lineTo(52, 45);
            ctx.lineTo(52, 52);
            ctx.lineTo(28, 52);
            ctx.closePath();
            ctx.fill();
        }
    }

    // ==================== Color Sort Game ====================
    class ColorSortGame {
        constructor(canvas, audio, saveManager, starManager, onBack, onComplete) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.starManager = starManager;
            this.onBack = onBack;
            this.onComplete = onComplete;
            this.particles = [];
            this.selectedCandy = null;
            this.candies = [];
            this.cupCandies = [0, 0, 0, 0];
            this.animatingCandyIndex = null;
            this.animatingTargetCup = null;
            this.fallingProgress = 0;
            // Item effects
            this.highlightColor = null;
            this.highlightTimer = 0;
            this.assistTarget = null;
            this.assistTimer = 0;
            this.timeSlow = false;
            this.timeSlowTimer = 0;
            this.doublePoints = false;
            this.shieldActive = false;
            this.revealActive = false;
            this.revealTimer = 0;
            this.itemButtons = [];
            this.init();
        }

        init() {
            // Generate 12 candies with random colors
            this.candies = [];
            for (let i = 0; i < 12; i++) {
                this.candies.push({
                    colorIndex: i % 4,
                    x: 100 + (i % 4) * 200,
                    y: 80,
                    matched: false,
                    floatOffset: Math.random() * Math.PI * 2
                });
            }
            this.selectedCandy = null;
            this.cupCandies = [0, 0, 0, 0];
            this.particles = [];
            this.highlightColor = null;
            this.highlightTimer = 0;
            this.assistTarget = null;
            this.assistTimer = 0;
            this.timeSlow = false;
            this.timeSlowTimer = 0;
            this.doublePoints = false;
            this.shieldActive = false;
            this.revealActive = false;
            this.revealTimer = 0;
            this.setupItemButtons();
            this.canvas.onclick = (e) => this.handleClick(e);
        }

        setupItemButtons() {
            this.itemButtons = [];
            const items = [
                { id: 'color_magnifier', label: '🔍', x: 720, y: 30 },
                { id: 'sort_assist', label: '✨', x: 770, y: 30 },
                { id: 'time_slow', label: '⏳', x: 720, y: 70 },
                { id: 'double_points', label: '✖2', x: 770, y: 70 },
                { id: 'shield', label: '🛡', x: 720, y: 110 },
                { id: 'reveal_answer', label: '📖', x: 770, y: 110 }
            ];
            items.forEach(item => {
                const count = this.starManager.getItemCount(item.id);
                if (count > 0) {
                    this.itemButtons.push({ ...item, count });
                }
            });
        }

        useItem(itemId) {
            if (!this.starManager.hasItem(itemId)) return false;
            this.starManager.useItem(itemId);
            if (itemId === 'color_magnifier') {
                if (this.selectedCandy !== null) {
                    this.highlightColor = this.candies[this.selectedCandy].colorIndex;
                    this.highlightTimer = 120;
                }
                this.audio.playSound('select');
            } else if (itemId === 'sort_assist') {
                // Find first matching pair
                for (let i = 0; i < this.candies.length; i++) {
                    if (this.candies[i].matched) continue;
                    for (let j = i + 1; j < this.candies.length; j++) {
                        if (this.candies[j].matched) continue;
                        if (this.candies[i].colorIndex === this.candies[j].colorIndex) {
                            this.assistTarget = [i, j];
                            this.assistTimer = 180;
                            this.audio.playSound('success');
                            this.setupItemButtons();
                            return true;
                        }
                    }
                }
                this.starManager.addItem(itemId); // refund if no pair
                return false;
            } else if (itemId === 'time_slow') {
                this.timeSlow = true;
                this.timeSlowTimer = 600;
                this.audio.playSound('select');
            } else if (itemId === 'double_points') {
                this.doublePoints = true;
                this.setupItemButtons();
                return true;
            } else if (itemId === 'shield') {
                this.shieldActive = true;
                this.audio.playSound('select');
            } else if (itemId === 'reveal_answer') {
                this.revealActive = true;
                this.revealTimer = 300;
                this.audio.playSound('select');
            }
            this.setupItemButtons();
            return true;
        }

        getMousePos(e) {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (800 / rect.width),
                y: (e.clientY - rect.top) * (600 / rect.height)
            };
        }

        handleClick(e) {
            const pos = this.getMousePos(e);

            // Check item buttons
            for (const btn of this.itemButtons) {
                const dx = pos.x - btn.x;
                const dy = pos.y - btn.y;
                if (Math.abs(dx) < 25 && Math.abs(dy) < 20) {
                    this.useItem(btn.id);
                    return;
                }
            }

            // Back button
            if (pos.x < 70 && pos.y < 50) {
                this.audio.playSound('select');
                this.onBack();
                return;
            }

            // Check candy clicks
            for (let i = 0; i < this.candies.length; i++) {
                const candy = this.candies[i];
                if (candy.matched || this.animatingCandyIndex !== null) continue;
                const dist = Math.hypot(pos.x - candy.x, pos.y - candy.y);
                if (dist < 30) {
                    this.audio.playSound('select');
                    this.selectedCandy = this.selectedCandy === i ? null : i;
                    return;
                }
            }

            // Check cup clicks
            if (this.selectedCandy !== null) {
                for (let i = 0; i < 4; i++) {
                    const cupX = 100 + i * 200;
                    const cupY = 450;
                    const dist = Math.hypot(pos.x - cupX, pos.y - cupY);
                    if (dist < 50) {
                        const candy = this.candies[this.selectedCandy];
                        if (candy.colorIndex === i) {
                            this.audio.playSound('success');
                            this.animatingCandyIndex = this.selectedCandy;
                            this.animatingTargetCup = i;
                            this.fallingProgress = 0;
                            this.selectedCandy = null;
                        } else {
                            if (this.shieldActive) {
                                this.shieldActive = false;
                                this.audio.playSound('select');
                            } else {
                                this.audio.playSound('error');
                            }
                        }
                        return;
                    }
                }
            }
        }

        update() {
            if (this.animatingCandyIndex !== null) {
                this.fallingProgress += 0.03;
                if (this.fallingProgress >= 1) {
                    const candyIndex = this.animatingCandyIndex;
                    const targetCup = this.animatingTargetCup;
                    this.cupCandies[targetCup]++;
                    this.candies[candyIndex].matched = true;
                    // Particles
                    for (let j = 0; j < 10; j++) {
                        this.particles.push(new Particle(
                            this.candies[candyIndex].x,
                            450 - this.cupCandies[targetCup] * 10,
                            CUP_COLORS[targetCup]
                        ));
                    }
                    this.animatingCandyIndex = null;
                    this.animatingTargetCup = null;

                    // Check win
                    if (this.candies.every(c => c.matched)) {
                        setTimeout(() => {
                            this.audio.playSound('victory');
                            this.saveManager.markCompleted('color');
                            this.onComplete();
                        }, 300);
                    }
                }
            }
            if (this.highlightColor !== null) {
                this.highlightTimer--;
                if (this.highlightTimer <= 0) this.highlightColor = null;
            }
            if (this.assistTarget !== null) {
                this.assistTimer--;
                if (this.assistTimer <= 0) this.assistTarget = null;
            }
            if (this.timeSlow && this.timeSlowTimer > 0) {
                this.timeSlowTimer--;
                if (this.timeSlowTimer <= 0) this.timeSlow = false;
            }
            if (this.revealActive) {
                this.revealTimer--;
                if (this.revealTimer <= 0) this.revealActive = false;
            }
            this.particles = this.particles.filter(p => {
                p.update();
                return p.life > 0;
            });
        }

        draw() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, 800, 600);

            // Item buttons (top right)
            this.itemButtons.forEach(btn => {
                ctx.fillStyle = COLORS.primary;
                ctx.beginPath();
                ctx.roundRect(btn.x - 25, btn.y - 20, 50, 40, 8);
                ctx.fill();
                ctx.fillStyle = '#FFF';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(btn.label, btn.x, btn.y + 6);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(`×${btn.count}`, btn.x + 15, btn.y - 8);
            });

            // Title
            ctx.fillStyle = COLORS.text;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('颜色分类', 400, 60);

            // Back button
            this.drawBackButton();

            // Draw candies
            const time = Date.now() / 1000;
            this.candies.forEach((candy, i) => {
                if (candy.matched) return;
                const isSelected = this.selectedCandy === i;
                const floatY = Math.sin(time * 2 + candy.floatOffset) * 5;
                const y = candy.y + floatY;

                ctx.save();
                if (isSelected) {
                    ctx.shadowColor = '#333';
                    ctx.shadowBlur = 10;
                }

                // Candy body
                ctx.fillStyle = CANDY_COLORS[candy.colorIndex];
                ctx.beginPath();
                ctx.arc(candy.x, y, 25, 0, Math.PI * 2);
                ctx.fill();

                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(candy.x - 8, y - 8, 8, 0, Math.PI * 2);
                ctx.fill();

                // Wrapper ends
                ctx.fillStyle = CANDY_COLORS[candy.colorIndex];
                ctx.beginPath();
                ctx.moveTo(candy.x - 25, y);
                ctx.lineTo(candy.x - 40, y - 8);
                ctx.lineTo(candy.x - 40, y + 8);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(candy.x + 25, y);
                ctx.lineTo(candy.x + 40, y - 8);
                ctx.lineTo(candy.x + 40, y + 8);
                ctx.closePath();
                ctx.fill();

                ctx.restore();

                // Highlight effect for color_magnifier
                if (this.highlightColor !== null && candy.colorIndex === this.highlightColor) {
                    ctx.save();
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(candy.x, y, 30, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                // Assist effect for sort_assist
                if (this.assistTarget !== null && (this.assistTarget[0] === i || this.assistTarget[1] === i)) {
                    ctx.save();
                    ctx.strokeStyle = '#00FF00';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#00FF00';
                    ctx.shadowBlur = 20;
                    const pulse = Math.sin(Date.now() / 100) * 0.2 + 0.8;
                    ctx.globalAlpha = pulse;
                    ctx.beginPath();
                    ctx.arc(candy.x, y, 35, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
            });

            // Falling candy animation
            if (this.animatingCandyIndex !== null) {
                const p = this.fallingProgress;
                const candy = this.candies[this.animatingCandyIndex];
                const startY = 80;
                const endY = 450 - this.cupCandies[this.animatingTargetCup] * 10;
                const y = startY + (endY - startY) * this.easeInBounce(p);
                const x = candy.x;

                ctx.fillStyle = CANDY_COLORS[candy.colorIndex];
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw cups
            for (let i = 0; i < 4; i++) {
                const x = 100 + i * 200;
                const y = 450;
                const color = CUP_COLORS[i];

                // Cup body (trapezoid)
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(x - 45, y - 60);
                ctx.lineTo(x + 45, y - 60);
                ctx.lineTo(x + 55, y + 30);
                ctx.lineTo(x - 55, y + 30);
                ctx.closePath();
                ctx.fill();

                // Cup rim
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(x, y - 60, 50, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                // Inner shadow
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath();
                ctx.ellipse(x, y - 55, 40, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Candies in cup
                for (let j = 0; j < this.cupCandies[i]; j++) {
                    const cy = y - 5 - j * 12;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, cy, 10, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Label
                ctx.fillStyle = COLORS.text;
                ctx.font = '18px Arial';
                ctx.fillText(['红', '黄', '绿', '蓝'][i], x, y + 55);
            }

            // Instructions
            if (this.selectedCandy !== null) {
                ctx.fillStyle = COLORS.text;
                ctx.font = '20px Arial';
                ctx.fillText('点击对应颜色的杯子', 400, 560);
            }

            this.particles.forEach(p => p.draw(ctx));
        }

        easeInBounce(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        drawBackButton() {
            const ctx = this.ctx;
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.arc(40, 40, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(28, 45);
            ctx.lineTo(40, 28);
            ctx.lineTo(52, 45);
            ctx.lineTo(52, 52);
            ctx.lineTo(28, 52);
            ctx.closePath();
            ctx.fill();
        }
    }

    // ==================== Maze Game ====================
    class MazeGame {
        constructor(canvas, audio, saveManager, starManager, onBack, onComplete) {
            this.canvas = canvas;
            this.ctx = canvas.getContext('2d');
            this.audio = audio;
            this.saveManager = saveManager;
            this.starManager = starManager;
            this.onBack = onBack;
            this.onComplete = onComplete;
            this.particles = [];
            this.cellSize = 50;
            this.maze = [];
            this.player = { x: 1, y: 1 };
            this.exit = { x: 7, y: 7 };
            this.playerVisual = { x: 1, y: 1 };
            this.moving = false;
            this.moveProgress = 0;
            this.direction = null;
            this.bumpTime = 0;
            this.victory = false;
            // Item effects
            this.pathHighlight = [];
            this.canPhase = false;
